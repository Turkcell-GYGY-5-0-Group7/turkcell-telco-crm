site_name: Telco CRM Platform Documentation
site_description: Documentation hub for the Telco CRM Platform - architecture, services, events, security, and how to build and run it.
site_url: https://turkcell-gygy-5-0-group7.github.io/turkcell-telco-crm/
repo_url: https://github.com/turkcell-gygy-5-0-group7/turkcell-telco-crm
repo_name: turkcell-telco-crm
edit_uri: edit/master/docs/

docs_dir: docs
site_dir: site

# architecture/adr/ lives outside docs_dir; docs/adr is a git symlink to ../architecture/adr so
# every ADR is part of the site without duplicating a single file (mkdocs.yml cannot set
# docs_dir to the repo root itself - it must be a child directory of the config file's location).
not_in_nav: |
  README.md
  tasks/todo.md
  tasks/sprint-*/*.md
  tasks/sprint-*/**/*.md
  !tasks/sprint-*/README.md

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - def_list
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight
  - toc:
      permalink: true

plugins:
  - search

