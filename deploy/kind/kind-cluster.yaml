# Kind cluster for local verification of the Telco CRM Helm charts (Sprint 15).
# One control-plane node with host port mappings so ingress-nginx is reachable
# from the host on localhost:8081 (http) / 8443 (https).
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 18080
        protocol: TCP
      - containerPort: 443
        hostPort: 18443
        protocol: TCP
