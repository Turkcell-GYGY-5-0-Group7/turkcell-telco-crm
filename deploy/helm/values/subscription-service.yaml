# subscription-service (port 9005). Domain service.
serviceName: subscription-service
containerPort: 9005
service:
  port: 9005

image:
  tag: latest

# Feature 19.4.3 (ADR-026 Section 3, service-catalog.md Section 5 + event-
# catalog.md). Postgres (system of record), Keycloak (JWKS validation), Kafka
# (produces msisdn.*/subscription.*, consumes payment.completed.v1, event-
# catalog.md Section 2). `redis: true` is a DEVIATION from a literal reading
# of Section 5 alone (its Cache column does not list Redis for
# subscription-service): verified via microservices/configs/subscription-
# service/application.yml, which wires a Redisson-backed distributed lock
# ("Guards the MSISDN reservation-expiry reaper across replicas", ADR-024) -
# a real Redis egress dependency Section 5's cache-only framing does not
# capture. See templates/networkpolicy-egress.yaml's header comment for the
# same note applied to billing-service.
networkPolicy:
  egress:
    postgres: true
    redis: true
    keycloak: true
    kafka: true
    # Finding B fix (2026-07-18): subscription-service's real synchronous
    # callee per the 19.3 caller audit (OrderServiceClient -> order-service).
    services:
      - order-service

config:
  CONFIG_SERVER_URI: http://config-server:8888
  CONFIG_SERVER_USER: config
  # Feature 18.5: moved off dev,docker (plaintext DB block) to dev,k8s
  # (microservices/configs/subscription-service/application-k8s.yml), which
  # reads DB credentials from the environment instead.
  SPRING_PROFILES_ACTIVE: dev,k8s
  EUREKA_USERNAME: eureka

secrets:
  CONFIG_SERVER_PASSWORD: config
  EUREKA_PASSWORD: eureka
  REDIS_PASSWORD: telco
  # LOCAL-DEV-ONLY placeholders. Real values live in Vault KV v2 at
  # secret/subscription-service/db-credentials (18.5.1,
  # deploy/helm/vault/seed-secrets.sh) and are never committed here.
  SUBSCRIPTION_DB_USER: subscription
  SUBSCRIPTION_DB_PASSWORD: subscription

# Vault-backed secret sync (18.3.2, ADR-025 Section 1). Only consulted when
# vault.enabled=true (deploy/helm/telco-service/values.yaml default: false,
# local/dev unaffected). roleName defaults to serviceName above, matching the
# auth/kubernetes/role/subscription-service role written by
# deploy/helm/vault/bootstrap-k8s-auth.sh (18.2.3).
vault:
  secretKeys:
    - key: CONFIG_SERVER_PASSWORD
      path: subscription-service/app
      field: CONFIG_SERVER_PASSWORD
    - key: EUREKA_PASSWORD
      path: subscription-service/app
      field: EUREKA_PASSWORD
    - key: REDIS_PASSWORD
      path: subscription-service/app
      field: REDIS_PASSWORD
    - key: SUBSCRIPTION_DB_USER
      path: subscription-service/db-credentials
      field: username
    - key: SUBSCRIPTION_DB_PASSWORD
      path: subscription-service/db-credentials
      field: password
