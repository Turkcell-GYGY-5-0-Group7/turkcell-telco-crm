# payment-service (port 9008). Domain service. Adds the non-secret PSP mock
# outcome flag (compose PSP_MOCK_FORCE_OUTCOME); empty preserves the MockPsp
# ~10% random failure for local dev, non-empty (e.g. SUCCESS) forces an outcome.
serviceName: payment-service
containerPort: 9008
service:
  port: 9008

image:
  tag: latest

# Feature 19.4.3 (ADR-026 Section 3, service-catalog.md Section 5 + event-
# catalog.md). Postgres (system of record), Redis (idempotency keys, Section
# 5 - granted even though the dev/k8s profile does not yet wire a
# REDIS_HOST, same rationale as usage-service.yaml's identical note),
# Keycloak (JWKS validation), Kafka (produces payment.*, consumes order.*,
# event-catalog.md Section 2).
networkPolicy:
  egress:
    postgres: true
    redis: true
    keycloak: true
    kafka: true

config:
  CONFIG_SERVER_URI: http://config-server:8888
  CONFIG_SERVER_USER: config
  # Feature 18.5: moved off dev,docker (plaintext DB block) to dev,k8s
  # (microservices/configs/payment-service/application-k8s.yml), which reads
  # DB credentials from the environment instead.
  SPRING_PROFILES_ACTIVE: dev,k8s
  EUREKA_USERNAME: eureka
  PSP_MOCK_FORCE_OUTCOME: ""

secrets:
  CONFIG_SERVER_PASSWORD: config
  EUREKA_PASSWORD: eureka
  REDIS_PASSWORD: telco
  # LOCAL-DEV-ONLY placeholders. Real values live in Vault KV v2 at
  # secret/payment-service/db-credentials (18.5.1,
  # deploy/helm/vault/seed-secrets.sh) and are never committed here.
  PAYMENT_DB_USER: payment
  PAYMENT_DB_PASSWORD: payment

# Vault-backed secret sync (18.3.2, ADR-025 Section 1). Only consulted when
# vault.enabled=true (deploy/helm/telco-service/values.yaml default: false,
# local/dev unaffected). roleName defaults to serviceName above, matching the
# auth/kubernetes/role/payment-service role written by
# deploy/helm/vault/bootstrap-k8s-auth.sh (18.2.3).
vault:
  secretKeys:
    - key: CONFIG_SERVER_PASSWORD
      path: payment-service/app
      field: CONFIG_SERVER_PASSWORD
    - key: EUREKA_PASSWORD
      path: payment-service/app
      field: EUREKA_PASSWORD
    - key: REDIS_PASSWORD
      path: payment-service/app
      field: REDIS_PASSWORD
    - key: PAYMENT_DB_USER
      path: payment-service/db-credentials
      field: username
    - key: PAYMENT_DB_PASSWORD
      path: payment-service/db-credentials
      field: password
