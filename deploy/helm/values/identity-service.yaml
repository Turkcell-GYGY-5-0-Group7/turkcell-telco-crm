# identity-service (port 9001). Domain service; bootstraps against config-server
# and registers with discovery-server, exactly like its compose block.
serviceName: identity-service
containerPort: 9001
service:
  port: 9001

image:
  tag: latest

# Non-secret env -> ConfigMap. Mirrors the compose x-app-env NON-secret keys.
config:
  CONFIG_SERVER_URI: http://config-server:8888
  CONFIG_SERVER_USER: config
  # Feature 18.5: moved off dev,docker (plaintext DB block) to dev,k8s
  # (microservices/configs/identity-service/application-k8s.yml), which reads
  # DB credentials from the environment instead.
  SPRING_PROFILES_ACTIVE: dev,k8s
  EUREKA_USERNAME: eureka

# Secret env -> Secret. DEV-ONLY defaults (compose ${VAR:-default} fallbacks).
secrets:
  CONFIG_SERVER_PASSWORD: config
  EUREKA_PASSWORD: eureka
  REDIS_PASSWORD: telco
  # LOCAL-DEV-ONLY placeholders (vault.enabled=false path only). Real values
  # live in Vault KV v2 at secret/identity-service/db-credentials (18.5.1,
  # deploy/helm/vault/seed-secrets.sh) and are never committed here.
  IDENTITY_DB_USER: identity
  IDENTITY_DB_PASSWORD: identity

# Vault-backed secret sync (18.3.2, ADR-025 Section 1). Only consulted when
# vault.enabled=true (deploy/helm/telco-service/values.yaml default: false,
# local/dev unaffected). roleName defaults to serviceName above, matching the
# auth/kubernetes/role/identity-service role written by
# deploy/helm/vault/bootstrap-k8s-auth.sh (18.2.3). IDENTITY_DB_USER/PASSWORD
# (18.5.1/18.5.3) get their own Vault KV path
# (secret/identity-service/db-credentials) rather than sharing the "app" path.
vault:
  secretKeys:
    - key: CONFIG_SERVER_PASSWORD
      path: identity-service/app
      field: CONFIG_SERVER_PASSWORD
    - key: EUREKA_PASSWORD
      path: identity-service/app
      field: EUREKA_PASSWORD
    - key: REDIS_PASSWORD
      path: identity-service/app
      field: REDIS_PASSWORD
    - key: IDENTITY_DB_USER
      path: identity-service/db-credentials
      field: username
    - key: IDENTITY_DB_PASSWORD
      path: identity-service/db-credentials
      field: password
