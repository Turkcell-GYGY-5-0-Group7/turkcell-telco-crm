# discovery-server / Eureka (port 8761). Comes up independently of config-server
# (keeps its own local config, ADR-010), so it needs no config-server bootstrap
# env - only the Eureka basic-auth credentials. Its /actuator/health is reachable
# without auth (the compose healthcheck curls it unauthenticated). It exposes only
# health,info, so probes target /actuator/health rather than the liveness/readiness
# sub-groups.
serviceName: discovery-server
containerPort: 8761
service:
  port: 8761

image:
  tag: latest

probes:
  startup:
    path: /actuator/health
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 30
  liveness:
    path: /actuator/health
    initialDelaySeconds: 0
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 6
  readiness:
    path: /actuator/health
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6

config:
  EUREKA_USERNAME: eureka

secrets:
  EUREKA_PASSWORD: eureka

# Singleton Eureka registry: do not autoscale, and no PDB (single replica would
# otherwise block node drains). Overrides the chart defaults (15.3).
replicaCount: 1
autoscaling:
  enabled: false
pdb:
  enabled: false

# Vault-backed secret sync (18.3.2, ADR-025 Section 1). Only consulted when
# vault.enabled=true (deploy/helm/telco-service/values.yaml default: false,
# local/dev unaffected). roleName defaults to serviceName above, matching the
# auth/kubernetes/role/discovery-server role written by
# deploy/helm/vault/bootstrap-k8s-auth.sh (18.2.3).
vault:
  secretKeys:
    - key: EUREKA_PASSWORD
      path: discovery-server/app
      field: EUREKA_PASSWORD
