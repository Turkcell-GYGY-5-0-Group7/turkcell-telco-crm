apiVersion: v2
name: telco-linkerd-control-plane
description: >-
  Linkerd control plane (Feature 19.1.1, ADR-026 Section 1) - `linkerd-identity`
  (mTLS workload identity, self-managed trust anchor), `linkerd-destination`
  (service discovery + policy), and `linkerd-proxy-injector` (automatic
  sidecar injection, Feature 19.1.2). Wraps the official
  `linkerd-control-plane` chart, the same vendored-dependency pattern
  `deploy/helm/vault/Chart.yaml` (18.1.1) uses for `hashicorp/vault`. Must be
  installed after `deploy/helm/linkerd-crds/` (19.1.1's CRDs-first ordering)
  and requires `deploy/helm/linkerd-crds/` and a namespace named `linkerd` to
  already exist.

  Trust anchor: per ADR-026 Section 4, this platform uses Linkerd's
  self-managed trust anchor / issuer certificate generation - NOT
  cert-manager, NOT an external CA, and explicitly NOT Vault's PKI secrets
  engine (no dependency on `deploy/helm/vault/` at all). The root CA and
  issuer certificate are generated by the operator at install time (see
  `generate-trust-anchor.sh` in this directory) and passed in via
  `--set-file`/`--set`, exactly as Vault's unseal keys are handled in
  `deploy/RUNBOOK.md` Section 3 - real key material, generated once,
  NEVER committed to this repository.
type: application
version: 0.1.0
# Edge channel (Finding A fix, 2026-07-18): stable-2.14.10's control plane does
# not enforce L7 AuthorizationPolicy on current Kubernetes (policy-controller
# indexed zero resources; unauthorized identity reached the app; live-verified
# failing on k8s 1.36 and 1.28). Open-source Linkerd stable is EOL at 2.14.10;
# the edge channel is the maintained OSS line. Pinned for reproducibility. See
# ADR-026 Section 4 and docs/tasks/sprint-19-service-mesh-mtls/README.md.
appVersion: "edge-2026.6.3"
keywords:
  - telco-crm
  - linkerd
  - service-mesh
  - mtls
maintainers:
  - name: Telco CRM DevOps
dependencies:
  - name: linkerd-control-plane
    version: 2026.6.3
    repository: https://helm.linkerd.io/edge
