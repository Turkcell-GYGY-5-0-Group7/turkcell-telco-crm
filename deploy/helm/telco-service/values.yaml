# ---------------------------------------------------------------------------
# telco-service - sane defaults for one Spring Boot service.
#
# Every field here is overridable by a per-service values file under
# deploy/helm/values/<service>.yaml. The only REQUIRED override is
# `serviceName`, which drives the workload name, the Service DNS name (kept
# identical to the compose service name so the Spring 'docker' profile resolves
# it), the ConfigMap/Secret names, and the container image repository suffix.
#
# Secrets carry DEV-ONLY defaults in the per-service values files (mirroring the
# compose ${VAR:-default} fallbacks). NEVER commit a real/production secret:
# prod supplies these via `helm --set` / `--set-file` or a pre-created Secret.
# ---------------------------------------------------------------------------

# REQUIRED. e.g. "customer-service", "api-gateway", "config-server".
serviceName: ""

# Namespace the workload lands in. Matches the dependency chart so short-name
# DNS (postgres, kafka, config-server, ...) resolves in-cluster.
namespace: telco

replicaCount: 1

# Container image. Final ref is:
#   {registry}/{owner}/telco-{serviceName}:{tag}
# `owner` is set by the installer (GHCR org/user). `repository` may be set
# explicitly to override the derived "telco-<serviceName>" suffix.
image:
  registry: ghcr.io
  owner: OWNER
  repository: ""          # empty => telco-<serviceName>
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets: []

serviceAccount:
  create: true
  name: ""                # empty => serviceName

# The service's HTTP port (Spring server.port). Also the Service port.
containerPort: 8080

service:
  type: ClusterIP
  port: 8080

# Pod security context. runAsUser/runAsGroup/fsGroup are NUMERIC (K8s cannot
# verify a non-numeric image USER against runAsNonRoot). Matches the numeric UID
# baked into the service Dockerfiles.
securityContext:
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001

# Modest by default; heavier services (gateway, config-server) override.
resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

podAnnotations: {}
podLabels: {}

# Non-secret environment -> rendered into the per-service ConfigMap (15.2.2).
# Keys are used verbatim as env var names (hosts, ports, profiles, usernames,
# URIs, feature flags).
config: {}

# Secret environment -> rendered into the per-service Secret (15.2.2).
# Keys are used verbatim as env var names (passwords, encryption/PII keys,
# tokens). Values here are DEV-ONLY defaults; override in prod. IGNORED when
# vault.enabled is true (see below) - the Secret comes from the CSI sync
# instead, but carries the exact same key names.
secrets: {}

# Vault-backed secret delivery (Feature 18.3, ADR-025 Section 1). When false
# (the default - local/dev, matches Sprint 15 exactly), `templates/secret.yaml`
# renders a static Secret from `secrets:` above, unchanged from before this
# feature. When true, `templates/secret.yaml` renders nothing;
# `templates/secretproviderclass.yaml` instead renders a `SecretProviderClass`
# that the CSI volume mounted by `templates/deployment.yaml` triggers on pod
# start, and the Secrets Store CSI Driver's `secretObjects` sync materializes
# a Kubernetes Secret of the exact same name (`<service>-secret`) and key
# names as the static model - `envFrom.secretRef` in deployment.yaml is
# byte-for-byte unchanged either way.
vault:
  enabled: false

  # In-cluster Vault Service DNS (deploy/helm/vault installs the release named
  # "vault" into the "telco" namespace - short-name DNS resolves in-cluster,
  # same posture as every other in-cluster dependency this chart already
  # depends on, e.g. config-server/discovery-server).
  address: http://vault.telco.svc.cluster.local:8200

  # Vault Kubernetes-auth role name (18.2.3) - defaults to serviceName, which
  # is how every one of the 13 `auth/kubernetes/role/<service>` roles was
  # named (deploy/helm/vault/bootstrap-k8s-auth.sh).
  role: ""

  # Which of this service's secret keys sync from Vault, and where each one
  # lives in Vault KV v2 (relative to the `secret/` mount enabled by 18.2.2).
  # `key` is the resulting `<service>-secret` data key (must match the
  # `secrets:` keys used in the static/dev model above - see
  # deploy/helm/README.md's secret-key table). `path` + `field` is the Vault
  # KV v2 object and field within it. Populated per service in
  # deploy/helm/values/<service>.yaml; empty here so vault.enabled=true with
  # no overrides renders an (intentionally) empty SecretProviderClass rather
  # than guessing at a service's keys.
  secretKeys: []
  # secretKeys:
  #   - key: CONFIG_SERVER_PASSWORD    # -> <service>-secret data key
  #     path: customer-service/app      # -> secret/data/customer-service/app
  #     field: CONFIG_SERVER_PASSWORD   # -> field name inside that KV v2 object

# Probes. All three target /actuator/health, NOT the /actuator/health/liveness
# and /actuator/health/readiness sub-groups: every service's SecurityConfig
# permits exactly "/actuator/health" + "/actuator/info" but NOT the sub-group
# paths, so probing the sub-groups returns 401 and the kubelet kills the pod
# (liveness) - which crash-loops every domain service in-cluster. Using the
# permitted /actuator/health (which returns overall UP) keeps probes working and
# matches how config-server/discovery-server are already configured.
# FOLLOW-UP (security agent): permit "/actuator/health/**" in the 10 service
# SecurityConfigs to restore proper liveness/readiness separation, then repoint
# liveness->/actuator/health/liveness and readiness->/actuator/health/readiness.
# `httpHeaders` (list of {name,value}) covers services whose actuator is behind
# basic auth (config-server, discovery-server).
probes:
  httpHeaders: []
  startup:
    path: /actuator/health
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 30
  liveness:
    path: /actuator/health
    initialDelaySeconds: 0
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 6
  readiness:
    path: /actuator/health
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6

# Ingress. Enabled ONLY for api-gateway (the single externally exposed entry
# point); all other services stay ClusterIP-only and are reached through it.
ingress:
  enabled: false
  className: nginx
  host: telco.local
  path: /
  pathType: Prefix
  annotations: {}

# HPA (NFR-03). Enabled by default for stateless services (Wave 3 / 15.3); the
# two singleton infra services (config-server, discovery-server) override this
# OFF in their values files. minReplicas 2 gives the PDB something to protect.
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 75
  targetMemoryUtilizationPercentage: 0   # 0 => omit the memory metric
  # Fast scale-up, deliberate scale-down (short window so scale-in is observable
  # without flapping). autoscaling/v2 behavior.
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 2
          periodSeconds: 30
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 1
          periodSeconds: 30

# PodDisruptionBudget (NFR-04). Enabled by default (safe because autoscaled
# services keep minReplicas 2); the singleton infra services override it OFF.
pdb:
  enabled: true
  minAvailable: 1

# Linkerd Server/AuthorizationPolicy (Feature 19.3, ADR-026 Section 2 Layer 1).
# `enabled: true` (this default) renders templates/server.yaml (always, see
# that template) PLUS templates/authorizationpolicy.yaml +
# templates/meshtlsauthentication.yaml, restricting this service's app-port
# Server to accept inbound only from the mesh identities listed in
# `authorizedClients`. Each entry is another telco-service release's
# `serviceName`, expanded to
# "<name>.telco.serviceaccount.identity.linkerd.cluster.local" - the
# ServiceAccount-bound mesh identity Linkerd's Identity component issues per
# pod (confirmed live via `linkerd identity <pod>` against a running
# api-gateway pod, see docs/tasks/sprint-19-service-mesh-mtls/README.md's
# 19.3 verification record for the exact output).
#
# The default below (api-gateway only) is correct for most of the 10 domain
# services, whose only synchronous HTTP caller is api-gateway (ADR-005
# Section 2: internal sync calls are the minority, Kafka is primary). Three
# domain services have a REAL additional non-gateway synchronous caller,
# confirmed by reading each `RestClient`-based client class under
# microservices/<service>/.../infrastructure/client/, and are overridden in
# their own deploy/helm/values/<service>.yaml:
#   - product-catalog-service: also called directly by order-service
#     (ProductCatalogServiceClient), billing-service
#     (ProductCatalogBillingClient), and usage-service (ProductCatalogClient) -
#     all hit its tokenless GET /internal/tariffs/** endpoints.
#   - customer-service: also called directly by order-service
#     (CustomerServiceClient) -> tokenless GET /internal/customers/{id}.
#   - order-service: also called directly by subscription-service
#     (OrderServiceClient) -> tokenless GET /internal/orders/{id}, the
#     payment.completed.v1 activation path's one synchronous hop.
# config-server and discovery-server override `authorizedClients` to all 13
# service names (their actual caller set - every service fetches config /
# registers on startup), not narrowed to the gateway alone.
#
# api-gateway itself sets `enabled: false` (deploy/helm/values/api-gateway.yaml):
# its real caller is the Kind ingress-nginx controller, which runs in its own
# un-annotated `ingress-nginx` namespace (RUNBOOK Section 2.2) and is NOT
# mesh-injected, so it has no mesh identity to present - an AuthorizationPolicy
# requiring MeshTLS authentication on api-gateway's Server would reject the
# gateway's only real caller. templates/server.yaml still renders a Server for
# api-gateway (19.3.1's "one Server per service" AC), just with no
# AuthorizationPolicy attached - Linkerd's documented behavior for a Server
# with no attached AuthorizationPolicy is the cluster's default inbound
# policy (all-authenticated-or-unauthenticated allowed), not deny-all.
meshPolicy:
  enabled: true
  authorizedClients:
    - api-gateway

# Kubernetes NetworkPolicy per-service allow rules (Feature 19.4.2/19.4.3,
# ADR-026 Section 3). Compensating control for pods that are not (yet) meshed
# - see deploy/helm/dependencies/templates/networkpolicy-default-deny.yaml for
# the default-deny baseline this restores traffic on top of.
#
# Ingress (19.4.2): by default (`useAuthorizedClientsForIngress: true`) the
# ingress template (templates/networkpolicy-ingress.yaml) allows the exact
# same source set as `meshPolicy.authorizedClients` above - deliberately
# reusing that list rather than inventing a parallel one, so the network-layer
# control and the mesh-layer control can never silently drift apart and
# contradict each other for the common case (an edge added to one but not the
# other would either break legitimate traffic or leave a gap). Only
# api-gateway overrides this: its real caller is the Kind ingress-nginx
# controller (deploy/RUNBOOK.md Section 2.2), which is not itself a
# telco-service release and cannot be expressed as an `authorizedClients`
# entry - deploy/helm/values/api-gateway.yaml sets
# `useAuthorizedClientsForIngress: false` and `externalIngress: true` instead.
#
# Egress (19.4.3): `egress.*` are per-infra-dependency flags, all false here
# by default (the chart default declares no infra dependency - every real one
# is set true per service in deploy/helm/values/<service>.yaml, derived from
# docs/architecture/service-catalog.md Section 5's Infrastructure Profile
# table and docs/architecture/event-catalog.md's producer/consumer roster for
# the `kafka` flag). Egress to config-server/discovery-server (the mirror of
# the universal ingress rule) is NOT a flag here - it is rendered
# unconditionally per release by templates/networkpolicy-egress.yaml (except
# for config-server/discovery-server's own releases, which do not call
# themselves/each other the same way - see that template's header comment).
networkPolicy:
  enabled: true
  useAuthorizedClientsForIngress: true
  # Only consulted when useAuthorizedClientsForIngress is false.
  ingressFrom: []
  # Only true for api-gateway.
  externalIngress: false
  egress:
    postgres: false
    redis: false
    kafka: false
    minio: false
    mongo: false
    keycloak: false
    # Feature 19.4.3 (Finding B fix, 2026-07-18). Service-to-service HTTP egress:
    # the list of OTHER telco-service releases this service makes synchronous
    # HTTP calls to (api-gateway -> the domain services it routes to; the
    # documented domain -> domain callers). This is the egress-side mirror of
    # networkpolicy-ingress.yaml's `authorizedClients` ("who I call", vs "who
    # may call me") - without it, under the 19.4.1 default-deny baseline the
    # caller's OWN egress is denied to the callee even though the callee's
    # ingress rule admits it (both halves are required). Each entry is another
    # release's `serviceName`; rendered against the callee's named `http`
    # container port so no per-target port map is needed. Empty by default
    # (a service that calls no other service needs no service egress); set per
    # caller in deploy/helm/values/<service>.yaml.
    services: []
