{{- if .Values.vault.enabled }}
# Vault-backed secret source (18.3.2, ADR-025 Section 1). Read by the Vault
# CSI provider (deploy/helm/vault/values.yaml `vault.csi.enabled`) via the
# Secrets Store CSI Driver (deploy/helm/csi-driver/) when the CSI volume in
# templates/deployment.yaml is mounted on pod start. `roleName` must match one
# of the `auth/kubernetes/role/<service>` roles written by
# deploy/helm/vault/bootstrap-k8s-auth.sh (18.2.3), which is bound to this
# release's own ServiceAccount (templates/serviceaccount.yaml) - Vault policy
# enforces that this can only ever read secret/data/{{ .Values.serviceName }}/*.
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ include "telco-service.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "telco-service.labels" . | nindent 4 }}
spec:
  provider: vault
  parameters:
    vaultAddress: {{ .Values.vault.address | quote }}
    roleName: {{ .Values.vault.role | default (include "telco-service.fullname" .) | quote }}
    objects: |
      {{- range .Values.vault.secretKeys }}
      - objectName: {{ .key | quote }}
        secretPath: "secret/data/{{ .path }}"
        secretKey: {{ .field | quote }}
      {{- end }}
  {{- if .Values.vault.secretKeys }}
  # secretObjects materializes the objects fetched above into an ordinary
  # Kubernetes Secret with the SAME name and key names the static
  # templates/secret.yaml produced (deploy/helm/README.md's secret-key
  # table) - this is what makes deployment.yaml's `envFrom.secretRef` require
  # zero change between vault.enabled=false and vault.enabled=true.
  secretObjects:
    - secretName: {{ include "telco-service.secretName" . }}
      type: Opaque
      data:
        {{- range .Values.vault.secretKeys }}
        - objectName: {{ .key | quote }}
          key: {{ .key | quote }}
        {{- end }}
  {{- end }}
{{- end }}
