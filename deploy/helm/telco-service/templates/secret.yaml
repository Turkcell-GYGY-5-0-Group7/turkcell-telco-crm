{{- if and .Values.secrets (not .Values.vault.enabled) }}
# Sensitive configuration (15.2.2, NFR-06): passwords, encryption/PII keys.
# Projected into the pod via envFrom (secretRef). The values here come from the
# per-service values file and are DEV-ONLY defaults mirroring the compose
# ${VAR:-default} fallbacks. For any non-dev cluster, override at install time
# (helm --set / --set-file) or supply a pre-created/external Secret instead.
#
# Rendered ONLY when vault.enabled is false (local/dev default, Sprint 15
# behavior unchanged, 18.3.3). When vault.enabled is true, this Secret comes
# from the CSI driver's secretObjects sync instead (see
# templates/secretproviderclass.yaml) - same name, same keys.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "telco-service.secretName" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "telco-service.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $k, $v := .Values.secrets }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
{{- end }}
