{{- if .Values.autoscaling.enabled }}
# Horizontal Pod Autoscaler (NFR-03). Shipped DISABLED - services are
# "HPA-ready"; this is switched on in Wave 3 / 15.3.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "telco-service.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "telco-service.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "telco-service.fullname" . }}
  minReplicas: {{ .Values.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.maxReplicas }}
  metrics:
    {{- if .Values.autoscaling.targetCPUUtilizationPercentage }}
    - type: ContainerResource
      containerResource:
        name: cpu
        container: {{ .Values.serviceName }}
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetCPUUtilizationPercentage }}
    {{- end }}
    {{- if .Values.autoscaling.targetMemoryUtilizationPercentage }}
    - type: ContainerResource
      containerResource:
        name: memory
        container: {{ .Values.serviceName }}
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetMemoryUtilizationPercentage }}
    {{- end }}
  {{- with .Values.autoscaling.behavior }}
  # Scale-up/scale-down policies. A short scaleDown stabilization window makes
  # scale-in observable and prevents flapping; scaleUp is deliberately fast.
  behavior:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
