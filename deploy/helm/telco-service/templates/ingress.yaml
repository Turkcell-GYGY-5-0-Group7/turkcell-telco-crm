{{- if .Values.ingress.enabled }}
# External entry point (15.2.1 AC: "gateway reachable via Ingress"). Enabled
# ONLY for api-gateway; all other services are ClusterIP-only and reached
# through the gateway. The orchestrator installs ingress-nginx in Kind.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "telco-service.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "telco-service.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: {{ .Values.ingress.path }}
            pathType: {{ .Values.ingress.pathType }}
            backend:
              service:
                name: {{ include "telco-service.fullname" . }}
                port:
                  number: {{ .Values.service.port }}
{{- end }}
