apiVersion: v2
name: telco-service
description: >-
  Reusable Helm chart that renders a single stateless Spring Boot service of the
  Telco CRM platform (Deployment, Service, ConfigMap, Secret, optional Ingress,
  HPA and PDB). One chart, one per-service values file, one Helm release per
  service so each can be rolled back independently (Sprint 15.4). Non-secret
  configuration is projected via a per-service ConfigMap and sensitive values
  (passwords, encryption/PII keys) via a per-service Secret (ADR-010, NFR-06).
type: application
version: 0.1.0
appVersion: "1.0"
keywords:
  - telco-crm
  - spring-boot
  - microservice
maintainers:
  - name: Telco CRM DevOps
