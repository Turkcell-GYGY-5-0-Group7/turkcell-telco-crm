apiVersion: v2
name: telco-linkerd-crds
description: >-
  Linkerd Custom Resource Definitions (Feature 19.1.1, ADR-026 Section 1),
  installed ahead of the Linkerd control plane per Linkerd's official
  two-chart install model (`linkerd-crds` then `linkerd-control-plane`).
  Wraps the official `linkerd-crds` chart, the same vendored-dependency
  pattern `deploy/helm/vault/Chart.yaml` (18.1.1) and
  `deploy/helm/csi-driver/Chart.yaml` (18.3.1) already use for
  `hashicorp/vault` and `secrets-store-csi-driver`. No values overrides are
  needed - this chart only installs CRDs (`ServiceProfile`, the `policy.
  linkerd.io` and `gateway.networking.k8s.io` CRDs the proxy-injector/policy
  controller consume).
type: application
version: 0.1.0
# Edge channel (Finding A fix, 2026-07-18): open-source Linkerd stable ended at
# 2.14.10, whose control plane does not enforce L7 AuthorizationPolicy on
# current Kubernetes (live-verified failing on k8s 1.36 and 1.28). The edge
# channel is the maintained OSS line; pinned to a specific release for
# reproducibility. See ADR-026 and docs/tasks/sprint-19-service-mesh-mtls/README.md.
appVersion: "edge-2026.6.3"
keywords:
  - telco-crm
  - linkerd
  - service-mesh
  - mtls
maintainers:
  - name: Telco CRM DevOps
dependencies:
  - name: linkerd-crds
    version: 2026.6.3
    repository: https://helm.linkerd.io/edge
