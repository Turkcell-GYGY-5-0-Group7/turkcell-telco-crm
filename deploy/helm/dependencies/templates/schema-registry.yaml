{{- $c := "schema-registry" -}}
# Confluent Schema Registry - Avro contract governance (ADR-009, ADR-019). Backed by
# Kafka; the app charts address it as http://schema-registry:8081, unchanged from compose.
apiVersion: v1
kind: Service
metadata:
  name: schema-registry
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "telco-deps.componentLabels" (dict "ctx" . "component" $c) | nindent 4 }}
spec:
  selector:
    {{- include "telco-deps.selectorLabels" (dict "component" $c) | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.schemaRegistry.port }}
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: schema-registry
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "telco-deps.componentLabels" (dict "ctx" . "component" $c) | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "telco-deps.selectorLabels" (dict "component" $c) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "telco-deps.componentLabels" (dict "ctx" . "component" $c) | nindent 8 }}
    spec:
      # Disable Kubernetes service-link env injection. The Service named
      # "schema-registry" otherwise injects SCHEMA_REGISTRY_PORT=tcp://<ip>:8081,
      # which cp-schema-registry's entrypoint reads as the deprecated PORT setting
      # and hard-exits 1 in /etc/confluent/docker/configure before Kafka is ever
      # contacted. Turning off service links removes the collision.
      enableServiceLinks: false
      containers:
        - name: schema-registry
          image: {{ .Values.schemaRegistry.image | quote }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: {{ .Values.schemaRegistry.port }}
          env:
            - name: SCHEMA_REGISTRY_HOST_NAME
              value: schema-registry
            - name: SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS
              value: "PLAINTEXT://kafka:{{ .Values.kafka.port }}"
            - name: SCHEMA_REGISTRY_LISTENERS
              value: "http://0.0.0.0:{{ .Values.schemaRegistry.port }}"
          readinessProbe:
            exec:
              command: ["sh", "-c", "curl -fsS http://localhost:{{ .Values.schemaRegistry.port }}/subjects >/dev/null"]
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /subjects
              port: http
            initialDelaySeconds: 45
            periodSeconds: 20
            timeoutSeconds: 10
            failureThreshold: 6
          resources:
            {{- toYaml .Values.schemaRegistry.resources | nindent 12 }}
