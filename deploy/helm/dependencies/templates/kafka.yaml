{{- $c := "kafka" -}}
# Apache Kafka 4.x in KRaft mode (no ZooKeeper), single combined broker+controller
# node (ADR-003, ADR-009). Mirrors compose kafka, minus the HOST listener (host
# port mapping is a compose-only concern); in-cluster clients use INTERNAL kafka:9092.
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "telco-deps.componentLabels" (dict "ctx" . "component" $c) | nindent 4 }}
spec:
  # Headless: gives the StatefulSet pod its stable per-pod DNS
  # (kafka-0.kafka.<ns>.svc.cluster.local) that the KRaft controller quorum
  # must address directly. A ClusterIP here breaks controller self-registration.
  clusterIP: None
  selector:
    {{- include "telco-deps.selectorLabels" (dict "component" $c) | nindent 4 }}
  ports:
    - name: internal
      port: {{ .Values.kafka.port }}
      targetPort: internal
    - name: controller
      port: {{ .Values.kafka.controllerPort }}
      targetPort: controller
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "telco-deps.componentLabels" (dict "ctx" . "component" $c) | nindent 4 }}
spec:
  serviceName: kafka
  replicas: 1
  selector:
    matchLabels:
      {{- include "telco-deps.selectorLabels" (dict "component" $c) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "telco-deps.componentLabels" (dict "ctx" . "component" $c) | nindent 8 }}
    spec:
      containers:
        - name: kafka
          image: {{ .Values.kafka.image | quote }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: internal
              containerPort: {{ .Values.kafka.port }}
            - name: controller
              containerPort: {{ .Values.kafka.controllerPort }}
          env:
            - name: KAFKA_NODE_ID
              value: "1"
            - name: KAFKA_PROCESS_ROLES
              value: broker,controller
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              # Pod's stable headless DNS, not the load-balanced Service name.
              value: "1@kafka-0.kafka.{{ .Values.namespace }}.svc.cluster.local:{{ .Values.kafka.controllerPort }}"
            - name: KAFKA_LISTENERS
              value: "INTERNAL://:{{ .Values.kafka.port }},CONTROLLER://:{{ .Values.kafka.controllerPort }}"
            - name: KAFKA_ADVERTISED_LISTENERS
              value: "INTERNAL://kafka:{{ .Values.kafka.port }}"
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: "CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT"
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: INTERNAL
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: CONTROLLER
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: "1"
            - name: KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS
              value: "0"
            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: "true"
          volumeMounts:
            - name: data
              mountPath: /var/lib/kafka/data
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - /opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:{{ .Values.kafka.port }} >/dev/null 2>&1
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 12
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - /opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:{{ .Values.kafka.port }} >/dev/null 2>&1
            initialDelaySeconds: 45
            periodSeconds: 20
            timeoutSeconds: 10
            failureThreshold: 6
          resources:
            {{- toYaml .Values.kafka.resources | nindent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.storageClass }}
        storageClassName: {{ .Values.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.kafka.storage | quote }}
