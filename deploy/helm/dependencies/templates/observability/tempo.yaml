{{- $c := "tempo" -}}
# Grafana Tempo - trace storage, receives OTLP from the collector (ADR-012). Config
# reused verbatim from infra/docker/observability/tempo.
apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "telco-deps.componentLabels" (dict "ctx" . "component" $c) | nindent 4 }}
data:
  tempo.yml: |
{{ .Files.Get "files/observability/tempo.yml" | indent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: tempo
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "telco-deps.componentLabels" (dict "ctx" . "component" $c) | nindent 4 }}
spec:
  selector:
    {{- include "telco-deps.selectorLabels" (dict "component" $c) | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.observability.tempo.httpPort }}
      targetPort: http
    - name: otlp-grpc
      port: {{ .Values.observability.tempo.otlpGrpcPort }}
      targetPort: otlp-grpc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tempo
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "telco-deps.componentLabels" (dict "ctx" . "component" $c) | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "telco-deps.selectorLabels" (dict "component" $c) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "telco-deps.componentLabels" (dict "ctx" . "component" $c) | nindent 8 }}
      annotations:
        checksum/config: {{ .Files.Get "files/observability/tempo.yml" | sha256sum }}
    spec:
      containers:
        - name: tempo
          image: {{ .Values.observability.tempo.image | quote }}
          imagePullPolicy: IfNotPresent
          args:
            - -config.file=/etc/tempo/tempo.yml
          ports:
            - name: http
              containerPort: {{ .Values.observability.tempo.httpPort }}
            - name: otlp-grpc
              containerPort: {{ .Values.observability.tempo.otlpGrpcPort }}
          volumeMounts:
            - name: config
              mountPath: /etc/tempo
              readOnly: true
            - name: data
              mountPath: /var/tempo
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 10
          resources:
            {{- toYaml .Values.observability.tempo.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: tempo-config
        - name: data
          persistentVolumeClaim:
            claimName: tempo-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tempo-data
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "telco-deps.componentLabels" (dict "ctx" . "component" $c) | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  {{- if .Values.storageClass }}
  storageClassName: {{ .Values.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.observability.tempo.storage | quote }}
