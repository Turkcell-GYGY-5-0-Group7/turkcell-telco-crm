{{- $c := "prometheus" -}}
# Prometheus - metrics scrape + SLO alert rules (ADR-012, NFR-09). The scrape config
# is the in-cluster variant (files/observability/prometheus.yml): compose
# host.docker.internal targets are rewritten to Kubernetes Service DNS names. Alert
# rules are reused verbatim from infra/docker/observability/prometheus/alerts.yml.
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "telco-deps.componentLabels" (dict "ctx" . "component" $c) | nindent 4 }}
data:
  prometheus.yml: |
{{ .Files.Get "files/observability/prometheus.yml" | indent 4 }}
  alerts.yml: |
{{ .Files.Get "files/observability/alerts.yml" | indent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "telco-deps.componentLabels" (dict "ctx" . "component" $c) | nindent 4 }}
spec:
  selector:
    {{- include "telco-deps.selectorLabels" (dict "component" $c) | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.observability.prometheus.port }}
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "telco-deps.componentLabels" (dict "ctx" . "component" $c) | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "telco-deps.selectorLabels" (dict "component" $c) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "telco-deps.componentLabels" (dict "ctx" . "component" $c) | nindent 8 }}
      annotations:
        checksum/config: {{ .Files.Get "files/observability/prometheus.yml" | sha256sum }}
        checksum/alerts: {{ .Files.Get "files/observability/alerts.yml" | sha256sum }}
    spec:
      containers:
        - name: prometheus
          image: {{ .Values.observability.prometheus.image | quote }}
          imagePullPolicy: IfNotPresent
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
          ports:
            - name: http
              containerPort: {{ .Values.observability.prometheus.port }}
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
              readOnly: true
            - name: data
              mountPath: /prometheus
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 10
          resources:
            {{- toYaml .Values.observability.prometheus.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          persistentVolumeClaim:
            claimName: prometheus-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-data
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "telco-deps.componentLabels" (dict "ctx" . "component" $c) | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  {{- if .Values.storageClass }}
  storageClassName: {{ .Values.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.observability.prometheus.storage | quote }}
