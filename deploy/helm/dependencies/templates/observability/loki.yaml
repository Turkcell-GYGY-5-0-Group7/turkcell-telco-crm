{{- $c := "loki" -}}
# Grafana Loki - log storage, receives OTLP logs from the collector (ADR-012). Config
# reused verbatim from infra/docker/observability/loki.
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "telco-deps.componentLabels" (dict "ctx" . "component" $c) | nindent 4 }}
data:
  loki-config.yml: |
{{ .Files.Get "files/observability/loki-config.yml" | indent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: loki
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "telco-deps.componentLabels" (dict "ctx" . "component" $c) | nindent 4 }}
spec:
  selector:
    {{- include "telco-deps.selectorLabels" (dict "component" $c) | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.observability.loki.httpPort }}
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "telco-deps.componentLabels" (dict "ctx" . "component" $c) | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "telco-deps.selectorLabels" (dict "component" $c) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "telco-deps.componentLabels" (dict "ctx" . "component" $c) | nindent 8 }}
      annotations:
        checksum/config: {{ .Files.Get "files/observability/loki-config.yml" | sha256sum }}
    spec:
      containers:
        - name: loki
          image: {{ .Values.observability.loki.image | quote }}
          imagePullPolicy: IfNotPresent
          args:
            - -config.file=/etc/loki/loki-config.yml
          ports:
            - name: http
              containerPort: {{ .Values.observability.loki.httpPort }}
          volumeMounts:
            - name: config
              mountPath: /etc/loki
              readOnly: true
            - name: data
              mountPath: /loki
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 10
          resources:
            {{- toYaml .Values.observability.loki.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: loki-config
        - name: data
          persistentVolumeClaim:
            claimName: loki-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: loki-data
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "telco-deps.componentLabels" (dict "ctx" . "component" $c) | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  {{- if .Values.storageClass }}
  storageClassName: {{ .Values.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.observability.loki.storage | quote }}
