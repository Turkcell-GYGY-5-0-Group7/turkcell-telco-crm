{{- $c := "minio" -}}
# MinIO - S3-compatible object storage for KYC documents and invoice PDFs (ADR-006).
# S3 API on :9000 (customer/billing services expect it there), console on :9090.
apiVersion: v1
kind: Secret
metadata:
  name: minio-credentials
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "telco-deps.componentLabels" (dict "ctx" . "component" $c) | nindent 4 }}
type: Opaque
stringData:
  MINIO_ROOT_USER: {{ .Values.minio.rootUser | quote }}
  MINIO_ROOT_PASSWORD: {{ .Values.minio.rootPassword | quote }}
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "telco-deps.componentLabels" (dict "ctx" . "component" $c) | nindent 4 }}
spec:
  selector:
    {{- include "telco-deps.selectorLabels" (dict "component" $c) | nindent 4 }}
  ports:
    - name: s3
      port: {{ .Values.minio.apiPort }}
      targetPort: s3
    - name: console
      port: {{ .Values.minio.consolePort }}
      targetPort: console
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "telco-deps.componentLabels" (dict "ctx" . "component" $c) | nindent 4 }}
spec:
  serviceName: minio
  replicas: 1
  selector:
    matchLabels:
      {{- include "telco-deps.selectorLabels" (dict "component" $c) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "telco-deps.componentLabels" (dict "ctx" . "component" $c) | nindent 8 }}
    spec:
      containers:
        - name: minio
          image: {{ .Values.minio.image | quote }}
          imagePullPolicy: IfNotPresent
          args:
            - server
            - /data
            - --console-address
            - ":{{ .Values.minio.consolePort }}"
          envFrom:
            - secretRef:
                name: minio-credentials
          ports:
            - name: s3
              containerPort: {{ .Values.minio.apiPort }}
            - name: console
              containerPort: {{ .Values.minio.consolePort }}
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /minio/health/live
              port: s3
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: s3
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            {{- toYaml .Values.minio.resources | nindent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.storageClass }}
        storageClassName: {{ .Values.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.minio.storage | quote }}
---
# One-shot bucket bootstrap: mirrors the compose 'createbuckets' job. Creates the
# kyc-documents bucket idempotently once MinIO is reachable. Re-runnable on upgrade.
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-createbuckets
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "telco-deps.componentLabels" (dict "ctx" . "component" $c) | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "5"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  backoffLimit: 10
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        {{- include "telco-deps.selectorLabels" (dict "component" "minio-createbuckets") | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: {{ .Values.minio.mcImage | quote }}
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: minio-credentials
          command:
            - sh
            - -c
            - |
              until mc alias set local http://minio:{{ .Values.minio.apiPort }} "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD" >/dev/null 2>&1; do
                echo "waiting for minio..."; sleep 3;
              done
              mc mb --ignore-existing local/{{ .Values.minio.bucket }}
              echo "bucket {{ .Values.minio.bucket }} ready"
