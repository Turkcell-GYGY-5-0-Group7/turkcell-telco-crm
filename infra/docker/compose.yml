  # ---------------------------------------------------------------------------
  # web-bff (apps profile, port 9020). Simple Service Layer, fully stateless:
  # no Postgres, no Kafka, no Redis - its single egress is the API gateway over
  # HTTP (ADR-022). It therefore overrides *app-depends instead of inheriting it,
  # and depends only on config-server, discovery-server and api-gateway. Docker-
  # network addresses (gateway base-url, Keycloak) come from configs/web-bff/
  # application-docker.yml served by config-server, NOT from container env.
  # ---------------------------------------------------------------------------
  web-bff:
    <<: *app-common
    build:
      context: ../../
      dockerfile: microservices/web-bff/Dockerfile
    image: telco-web-bff:local
    container_name: telco-web-bff
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      api-gateway:
        condition: service_healthy
    ports:
      - "${WEB_BFF_PORT:-9020}:9020"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9020/actuator/health | grep -q UP || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 90s
