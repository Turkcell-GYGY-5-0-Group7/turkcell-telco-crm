  notification-service:
    <<: *app-common
    build:
      context: ../../
      dockerfile: microservices/notification-service/Dockerfile
    image: telco-notification-service:local
    container_name: telco-notification-service
    depends_on:
      <<: *app-depends
      mongo:
        condition: service_healthy
    ports:
      - "${NOTIFICATION_SERVICE_PORT:-9009}:9009"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9009/actuator/health | grep -q UP || exit 1"]
