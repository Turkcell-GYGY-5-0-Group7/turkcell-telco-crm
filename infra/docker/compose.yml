# ---------------------------------------------------------------------------
# Telco CRM - local infrastructure
#
# Profiles:
#   (none)        core data + event backbone: postgres, redis, kafka,
#                 schema-registry, kafka-connect (Debezium), minio (object store),
#                 mongo (notification-service document store, ADR-006)
#   platform      Spring Boot infra services: config-server, discovery-server,
#                 api-gateway (built from source; requires ENCRYPT_KEY in .env)
#   tools         kafka-ui
#   observability prometheus, grafana, loki, tempo, otel-collector
#   auth          keycloak
#   apps          the 10 domain services (identity, customer, product-catalog,
#                 order, subscription, usage, billing, payment, notification,
#                 ticket) - built from source, ports 9001-9010
#
# Usage (run from infra/docker, after `cp .env.example .env`):
#   docker compose up -d                                      # core only
#   docker compose --profile platform up -d                   # core + Spring infra
#   docker compose --profile platform --profile auth up -d    # + Keycloak
#   docker compose --profile observability up -d              # core + observability
#   docker compose --profile tools --profile auth up -d
#   docker compose --profile auth --profile platform --profile apps up -d  # full stack
#
# First-time platform build (images are cached after first run):
#   docker compose --profile platform build
#   docker compose --profile apps build
#
# ---------------------------------------------------------------------------
# MEMORY BUDGET (single developer machine)
#
# Why every JVM here is explicitly capped: a JVM with no -Xmx sizes its heap from
# the HOST's RAM (MaxRAMPercentage of ~15.7 GB), not from what Docker can spare.
# The full stack is 23 containers, ~15 of them JVMs; each one independently decided
# it could have multiple GB of heap. Running them together drove free memory to
# 0.6 GB and OOM-hung the Docker engine (API returned 500s until Docker Desktop was
# restarted). Every JVM below therefore gets an explicit heap cap, overridable from
# infra/docker/.env. Do not remove these caps to "fix" a slow service - raise the
# one cap that needs it.
#
# THE REAL CEILING IS THE DOCKER VM, NOT THE HOST. The host has 15.7 GB, but every
# container runs inside Docker Desktop's Linux VM, which is hard-capped. Measure it -
# do not guess:
#
#   docker info --format '{{.MemTotal}}'   ->  8171184128 bytes = 7793 MiB = 7.61 GiB
#
# That 7.61 GiB is the absolute ceiling for ALL containers combined. The VM's own
# kernel + dockerd + containerd take ~400-500 MB of it, leaving roughly 7.3 GB for
# containers. Budget below targets ~6.8 GB so the engine keeps a real reserve: it was
# running the VM down to near-zero free that hung the Docker API in the first place.
# (Raise the ceiling if you want more comfort: set memory= in %USERPROFILE%\.wslconfig
# and `wsl --shutdown`. Nothing here depends on that.)
#
# Budget for the SPRINT 16 E2E SUBSET (see "Sprint 16 E2E subset" below).
# JVM RSS is heap + metaspace + code cache + thread stacks + direct buffers + GC
# native, so each estimate sits well above its -Xmx.
#
#   container                  heap cap (-Xmx)   est. RSS
#   -------------------------  ---------------   --------
#   postgres                   n/a (native)        350 MB
#   redis                      n/a (native)         40 MB
#   minio                      n/a (native)        200 MB
#   kafka                      320m                620 MB
#   kafka-connect              448m                780 MB   (Debezium, saga path)
#   keycloak                   256m                500 MB
#   config-server              160m                330 MB
#   discovery-server           160m                320 MB
#   api-gateway                256m                470 MB
#   7 domain services          192m each          2800 MB   (400 MB each)
#   web-bff                    192m                380 MB
#   -------------------------  ---------------   --------
#   TOTAL (18 long-lived containers)              6790 MB  ~= 6.63 GB
#
# Plus two short-lived one-shots that exit (createbuckets ~20 MB, keycloak-config
# ~150 MB JVM). Startup peak is therefore ~6.95 GB, inside the ~7.3 GB usable, with
# ~350 MB of engine reserve left. It fits - but only just, and only for this subset.
# Do not start observability/tools/mongo/identity/notification/ticket alongside it.
#
# These heaps are sized for a functional single-user E2E walk-through, not for load.
# If one service genuinely OOMEs, raise that ONE cap in infra/docker/.env rather than
# widening them all. The SvelteKit dev server runs on the HOST, outside this VM, so it
# does not draw on this budget.
#
# campaign-service (Sprint 21, port 9011) joined the apps profile 2026-07-18: one more
# 192m-heap JVM (~400 MB RSS) on the same caps. It is NOT in the Sprint 16 subset. The
# full auth+platform+apps stack (now 11 domain services + campaign-service's share of
# the budget) needs a Docker VM comfortably above the 7.61 GiB documented here - gate
# with `docker info --format '{{.MemTotal}}'` (>= ~12 GiB recommended) before a full-
# stack run.
# ---------------------------------------------------------------------------
#
# Sprint 16 E2E subset (fits the budget above):
#   make -C infra sprint16-e2e            # or, equivalently:
#   docker compose --env-file .env -f compose.yml \
#     --profile platform --profile auth --profile apps up -d \
#     postgres redis kafka kafka-connect minio createbuckets \
#     keycloak keycloak-config config-server discovery-server api-gateway \
#     product-catalog-service customer-service order-service payment-service \
#     subscription-service usage-service billing-service web-bff
#   make -C infra sprint16-connectors     # register only the 7 needed connectors
#
# Deliberately EXCLUDED from that subset (still available for other work):
#   identity-service      realm users are pre-seeded by the Keycloak realm import
#   notification-service  not on the onboarding happy path
#   ticket-service        not on the onboarding happy path
#   mongo                 notification-service's store only (ADR-006)
#   kafka-ui              a debugging tool, not a dependency
#   schema-registry       NOT required at runtime. Per ADR-019 Amendment A2 the
#                         outbox publishes plain JSON, and every connector in
#                         kafka-connect/connectors/*.json uses StringConverter +
#                         JsonConverter with value.converter.schemas.enable=false.
#                         No service config or POM references a schema registry or
#                         an Avro (de)serializer. The .avsc files are design-time
#                         governance artifacts, not a runtime dependency.
#   observability stack   prometheus/grafana/loki/tempo/otel-collector
# ---------------------------------------------------------------------------

name: ${COMPOSE_PROJECT_NAME:-telco-crm}

x-restart: &restart unless-stopped

# ---------------------------------------------------------------------------
# Shared config for the 10 domain services (apps profile). Mirrors the
# api-gateway block above: same config-server bootstrap, same Eureka/Redis
# placeholders, same dependency graph on config-server/discovery-server/
# kafka/postgres. Kept as anchors so the 10 per-service blocks only need to
# vary name/dockerfile/image/container_name/port.
# ---------------------------------------------------------------------------
x-app-env: &app-env
  CONFIG_SERVER_URI: http://config-server:8888
  CONFIG_SERVER_USER: ${CONFIG_SERVER_USER:-config}
  CONFIG_SERVER_PASSWORD: ${CONFIG_SERVER_PASSWORD:-config}
  SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev},docker
  EUREKA_USERNAME: ${EUREKA_USERNAME:-eureka}
  EUREKA_PASSWORD: ${EUREKA_PASSWORD:-eureka}
  REDIS_PASSWORD: ${REDIS_PASSWORD:-telco}
  # Docker-network Redis host for the starter-lock adopters (subscription-service,
  # billing-service, campaign-service): their telco.platform.lock.redis.address is
  # redis://:${REDIS_PASSWORD}@${REDIS_HOST:localhost}:${REDIS_PORT} - without this
  # the fallback resolves to localhost INSIDE the container and Redisson fails context
  # refresh at boot (crashloop). Mirrors api-gateway's own REDIS_HOST env. Found by the
  # 2026-07-18 full-stack E2E re-test: the full compose stack had never been booted
  # since Sprint 17 adopted starter-lock.
  REDIS_HOST: redis
  # Cap the JVM heap. Without this each Spring service sizes its heap from the HOST's RAM
  # (MaxRAMPercentage of ~15 GB) and balloons, which OOM-hangs the Docker engine when the
  # whole stack runs on one developer machine. SerialGC keeps thread/heap overhead low for
  # these small heaps. Heap alone is not the whole footprint, so metaspace, code cache,
  # direct buffers and thread stacks are capped too - that is what makes RSS predictable
  # (see the MEMORY BUDGET block at the top of this file). 192m of heap is ample for a
  # functional E2E walk-through - these services idle well under 120m - and 8 of them run
  # at once, so every 64m here costs 512m of VM. Raise it via JAVA_TOOL_OPTIONS in
  # infra/docker/.env if a service actually OOMEs.
  JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:--Xms96m -Xmx192m -XX:+UseSerialGC -XX:MaxMetaspaceSize=160m -XX:ReservedCodeCacheSize=96m -XX:MaxDirectMemorySize=64m -Xss512k}

x-app-depends: &app-depends
  config-server:
    condition: service_healthy
  discovery-server:
    condition: service_healthy
  kafka:
    condition: service_healthy
  postgres:
    condition: service_healthy

x-app: &app-common
  restart: *restart
  profiles: [apps]
  environment: *app-env
  depends_on: *app-depends
  networks: [telco]

networks:
  telco:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  kafka-data:
  grafana-data:
  prometheus-data:
  minio-data:
  mongo-data:

services:

  # ---------------------------------------------------------------- PostgreSQL
  postgres:
    image: postgres:${POSTGRES_VERSION:-17}
    container_name: telco-postgres
    restart: *restart
    # wal_level=logical is required for Debezium change data capture (ADR-005).
    # Slot/sender ceilings sized for one replication slot per outbox connector (11 as
    # of campaign-service, Sprint 21) plus headroom - the old value of 10 was exactly
    # the pre-campaign connector count, and the 11th connector's slot creation failed
    # (found by the 2026-07-18 full-stack E2E re-test).
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_wal_senders=16
      - -c
      - max_replication_slots=16
      - -c
      - max_connections=200
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-telco}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-telco}
      POSTGRES_DB: postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-telco}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [telco]

  # --------------------------------------------------------------------- Redis
  redis:
    image: redis:${REDIS_VERSION:-8}
    container_name: telco-redis
    restart: *restart
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-telco}", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-telco}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [telco]

  # -------------------------------------------------------------------- MongoDB
  # Document store for notification-service only (ADR-006 approved MongoDB
  # pilot; all other services are Postgres-backed). No auth configured: matches
  # the unauthenticated mongodb://mongo:27017/notification_db URI used across
  # every notification-service profile (dev/docker/test), local dev only.
  mongo:
    image: mongo:${MONGO_VERSION:-7}
    container_name: telco-mongo
    restart: *restart
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [telco]

  # --------------------------------------------------------------------- Kafka
  # Apache Kafka 4.x in KRaft mode (no ZooKeeper), single combined node (ADR-003).
  kafka:
    image: apache/kafka:${KAFKA_VERSION:-4.0.0}
    container_name: telco-kafka
    restart: *restart
    ports:
      - "${KAFKA_HOST_PORT:-29092}:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: INTERNAL://:9092,CONTROLLER://:9093,HOST://:29092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,HOST://localhost:${KAFKA_HOST_PORT:-29092}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      # The image defaults to a host-RAM-sized heap (~1 GB+), which is far more than a
      # single-node dev broker with a handful of low-volume topics needs, and which helps
      # OOM-hang the Docker engine when the whole stack runs on one machine.
      KAFKA_HEAP_OPTS: ${KAFKA_HEAP_OPTS:--Xms192m -Xmx320m}
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 12
    networks: [telco]

  # ----------------------------------------------------------- Schema Registry
  # NOT on the runtime path: per ADR-019 Amendment A2 the outbox publishes plain JSON and
  # every Debezium connector uses JsonConverter (schemas.enable=false), so nothing in the
  # stack talks to this at runtime. Kept for schema-governance tooling and future Avro work;
  # it is simply not started by the Sprint 16 E2E subset. Heap is capped for when it is.
  schema-registry:
    image: confluentinc/cp-schema-registry:${SCHEMA_REGISTRY_VERSION:-7.9.0}
    container_name: telco-schema-registry
    restart: *restart
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "${SCHEMA_REGISTRY_PORT:-8081}:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:9092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      # Image default is a host-RAM-sized heap; see the MEMORY BUDGET block at the top.
      SCHEMA_REGISTRY_HEAP_OPTS: ${SCHEMA_REGISTRY_HEAP_OPTS:--Xms128m -Xmx256m}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/subjects >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 12
    networks: [telco]

  # ------------------------------------------------- Kafka Connect (Debezium)
  # Delivers the transactional outbox to Kafka (ADR-009); the onboarding saga does not
  # complete without it. It does NOT depend on schema-registry: the converters below (and
  # in every connectors/*.json) are JsonConverter with schemas disabled, so there is no
  # registry lookup on any code path. The former depends_on schema-registry was dead weight
  # that dragged an extra ~400 MB JVM into every `up`, so it is gone (ADR-019 Amendment A2).
  kafka-connect:
    image: quay.io/debezium/connect:${DEBEZIUM_CONNECT_VERSION:-3.1.0.Final}
    container_name: telco-kafka-connect
    restart: *restart
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "${KAFKA_CONNECT_PORT:-8083}:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      # Debezium's connect image defaults to -Xms1G -Xmx1G; see the MEMORY BUDGET block at
      # the top. Kept the most generous of the infra heaps: this is the saga's critical path.
      KAFKA_HEAP_OPTS: ${KAFKA_CONNECT_HEAP_OPTS:--Xms256m -Xmx448m}
      GROUP_ID: telco-connect
      CONFIG_STORAGE_TOPIC: _connect_configs
      OFFSET_STORAGE_TOPIC: _connect_offsets
      STATUS_STORAGE_TOPIC: _connect_statuses
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8083/connectors >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 12
    networks: [telco]

  # ----------------------------------------------- Config Server (platform)
  # Build context is repo root (telco-crm/); run `docker compose --profile platform build` first.
  # Configs are mounted live from microservices/configs/ so edits take effect without rebuilding.
  # Also tagged with the "apps" profile: the 10 domain services depend_on this
  # service, and Compose does not auto-activate a dependency's profile across a
  # differing profile boundary, so `--profile apps` alone must still bring this
  # up (verified: `docker compose --profile apps config`).
  config-server:
    build:
      context: ../../
      dockerfile: microservices/config-server/Dockerfile
    image: telco-config-server:local
    container_name: telco-config-server
    restart: *restart
    profiles: [platform, apps]
    ports:
      - "${CONFIG_SERVER_PORT:-8888}:8888"
    environment:
      ENCRYPT_KEY: ${ENCRYPT_KEY:?Set ENCRYPT_KEY in infra/docker/.env (openssl rand -hex 32)}
      CONFIG_SERVER_USER: ${CONFIG_SERVER_USER:-config}
      CONFIG_SERVER_PASSWORD: ${CONFIG_SERVER_PASSWORD:-config}
      # Config-server resolves ${...} placeholders in served YAML using its own env.
      # These Docker-network addresses are needed so all client services receive
      # the correct host names instead of localhost defaults.
      REDIS_HOST: redis
      EUREKA_HOST: discovery-server
      EUREKA_PORT: 8761
      EUREKA_USERNAME: ${EUREKA_USERNAME:-eureka}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD:-eureka}
      KEYCLOAK_URI: http://keycloak:8080
      KEYCLOAK_JWKS_URI: ${KEYCLOAK_JWKS_URI:-http://keycloak:8080/realms/telco-crm/protocol/openid-connect/certs}
      # Heap cap: see the MEMORY BUDGET block at the top of this file. Serving static YAML
      # to ~12 clients needs very little heap.
      JAVA_TOOL_OPTIONS: ${CONFIG_SERVER_JAVA_TOOL_OPTIONS:--Xms64m -Xmx160m -XX:+UseSerialGC -XX:MaxMetaspaceSize=160m -XX:ReservedCodeCacheSize=96m -Xss512k}
    volumes:
      - ../../microservices/configs:/configs:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -u ${CONFIG_SERVER_USER:-config}:${CONFIG_SERVER_PASSWORD:-config} http://localhost:8888/actuator/health | grep -q UP || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 30s
    networks: [telco]

  # -------------------------------------------- Discovery Server (platform)
  # Also tagged with the "apps" profile for the same reason as config-server
  # above: the 10 domain services depend_on it, and `--profile apps` alone
  # must still resolve it.
  discovery-server:
    build:
      context: ../../
      dockerfile: microservices/discovery-server/Dockerfile
    image: telco-discovery-server:local
    container_name: telco-discovery-server
    restart: *restart
    profiles: [platform, apps]
    ports:
      - "${EUREKA_PORT:-8761}:8761"
    environment:
      EUREKA_USERNAME: ${EUREKA_USERNAME:-eureka}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD:-eureka}
      # Heap cap: see the MEMORY BUDGET block at the top of this file. A registry holding
      # ~12 instances needs very little heap.
      JAVA_TOOL_OPTIONS: ${DISCOVERY_SERVER_JAVA_TOOL_OPTIONS:--Xms64m -Xmx160m -XX:+UseSerialGC -XX:MaxMetaspaceSize=160m -XX:ReservedCodeCacheSize=96m -Xss512k}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8761/actuator/health | grep -q UP || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 30s
    networks: [telco]

  # -------------------------------------------------- API Gateway (platform)
  # Depends on config-server (healthy) and discovery-server (healthy) so routes
  # and Eureka registration are guaranteed before traffic is accepted.
  # Keycloak JWKS is fetched lazily on first token validation; gateway starts
  # successfully even when the auth profile is not active.
  # Also tagged with the "apps" profile for the same reason as config-server
  # above: web-bff depends_on this service (it is web-bff's only egress, ADR-022)
  # and Compose does not auto-activate a dependency's profile across a differing
  # profile boundary, so `--profile apps` alone must still bring it up
  # (verified: `docker compose --profile apps config`).
  api-gateway:
    build:
      context: ../../
      dockerfile: microservices/api-gateway/Dockerfile
    image: telco-api-gateway:local
    container_name: telco-api-gateway
    restart: *restart
    profiles: [platform, apps]
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    environment:
      # Bootstrap: how to reach config-server before any config is loaded.
      CONFIG_SERVER_URI: http://config-server:8888
      CONFIG_SERVER_USER: ${CONFIG_SERVER_USER:-config}
      CONFIG_SERVER_PASSWORD: ${CONFIG_SERVER_PASSWORD:-config}
      # 'docker' profile overrides localhost addresses in 'dev' with Docker service names.
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev},docker
      # Placeholder values used in shared configs/application-docker.yml Eureka defaultZone.
      EUREKA_USERNAME: ${EUREKA_USERNAME:-eureka}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD:-eureka}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-telco}
      # Heap cap: see the MEMORY BUDGET block at the top of this file. Sized above the domain
      # services because every request in the stack transits here, and Netty's direct buffers
      # (capped separately below) sit outside the heap.
      JAVA_TOOL_OPTIONS: ${API_GATEWAY_JAVA_TOOL_OPTIONS:--Xms96m -Xmx256m -XX:+UseSerialGC -XX:MaxMetaspaceSize=160m -XX:ReservedCodeCacheSize=96m -XX:MaxDirectMemorySize=96m -Xss512k}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health | grep -q UP || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 45s
    networks: [telco]

  # --------------------------------------------------------- MinIO (object store)
  # S3-compatible object storage for KYC document storage (Sprint 06, ADR-006).
  # Console is mapped to host 9090 (NOT 9001, which identity-service uses); the
  # S3 API stays on 9000 because customer-service expects it there.
  minio:
    image: minio/minio:${MINIO_VERSION:-RELEASE.2025-04-08T15-41-24Z}
    container_name: telco-minio
    restart: *restart
    command: server /data --console-address ":9090"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9090}:9090"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [telco]

  # ----------------------------------------------- MinIO bucket bootstrap
  # One-shot job: waits for MinIO to be healthy, points an mc alias at it, then
  # creates the kyc-documents bucket idempotently (--ignore-existing). Re-runs on
  # every `up`, so it survives a fresh volume / new machine.
  createbuckets:
    image: minio/mc:${MINIO_MC_VERSION:-RELEASE.2025-04-08T15-39-49Z}
    container_name: telco-minio-createbuckets
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["sh", "-c"]
    command:
      - |
        mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"
        mc mb --ignore-existing local/kyc-documents
        echo "bucket kyc-documents ready"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    networks: [telco]

  # --------------------------------------------------------- Kafka UI (tools)
  kafka-ui:
    image: provectuslabs/kafka-ui:${KAFKA_UI_VERSION:-latest}
    container_name: telco-kafka-ui
    restart: *restart
    profiles: [tools]
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "${KAFKA_UI_PORT:-8088}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: telco-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME: telco-connect
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS: http://kafka-connect:8083
    networks: [telco]

  # ---------------------------------------------------------- Keycloak (auth)
  keycloak:
    image: quay.io/keycloak/keycloak:${KEYCLOAK_VERSION:-26.1}
    container_name: telco-keycloak
    restart: *restart
    profiles: [auth]
    command: 
      - start-dev
      - --import-realm
    ports:
      - "${KEYCLOAK_PORT:-8085}:8080"
      - "${KEYCLOAK_MANAGEMENT_PORT:-8086}:9000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER:-keycloak}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak}
      # Keycloak's own JAVA_OPTS default to -XX:MaxRAMPercentage=70, i.e. ~11 GB of heap on a
      # 15.7 GB host - one of the biggest contributors to the OOM-hang (see the MEMORY BUDGET
      # block at the top). JAVA_OPTS_APPEND is appended AFTER that default, so an explicit
      # -Xmx wins over MaxRAMPercentage. Metaspace is capped high because Keycloak loads a lot
      # of classes.
      JAVA_OPTS_APPEND: ${KEYCLOAK_JAVA_OPTS_APPEND:--Xms96m -Xmx256m -XX:MaxMetaspaceSize=256m}
    volumes:
      - ./keycloak/realm:/opt/keycloak/data/import:ro
    networks: [telco]

  # ----------------------------------------------- Keycloak post-start config (auth)
  # Sets the master realm to sslRequired=NONE so the admin console is reachable over plain
  # HTTP during local dev. This cannot be done via realm import (master always pre-exists,
  # and overwriting it would wipe the admin user), so it is applied with kcadm after Keycloak
  # is up. Idempotent; re-applies on every `up`, so it survives `make destroy` / a new machine.
  keycloak-config:
    image: quay.io/keycloak/keycloak:${KEYCLOAK_VERSION:-26.1.4}
    container_name: telco-keycloak-config
    profiles: [auth]
    restart: "no"
    depends_on:
      keycloak:
        condition: service_started
    entrypoint: ["bash", "-c"]
    command:
      - |
        until /opt/keycloak/bin/kcadm.sh config credentials --server http://keycloak:8080 \
              --realm master --user "$$KC_ADMIN" --password "$$KC_ADMIN_PASSWORD" >/dev/null 2>&1; do
          echo "waiting for keycloak to be ready..."; sleep 3;
        done
        /opt/keycloak/bin/kcadm.sh update realms/master -s sslRequired=NONE
        echo "master realm sslRequired set to NONE"
    environment:
      KC_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KC_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      # kcadm.sh is another JVM that would otherwise size its heap from host RAM. It is
      # short-lived, but it runs concurrently with Keycloak's own startup - i.e. exactly at
      # the stack's peak memory moment. A tiny heap is plenty for a couple of admin calls.
      JAVA_OPTS_APPEND: ${KEYCLOAK_CONFIG_JAVA_OPTS_APPEND:--Xms32m -Xmx96m}
    networks: [telco]

  # -------------------------------------------------- Prometheus (observability)
  prometheus:
    image: prom/prometheus:${PROMETHEUS_VERSION:-v3.0.1}
    container_name: telco-prometheus
    restart: *restart
    profiles: [observability]
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks: [telco]

  # ------------------------------------------------------ Loki (observability)
  loki:
    image: grafana/loki:${LOKI_VERSION:-3.3.1}
    container_name: telco-loki
    restart: *restart
    profiles: [observability]
    command: ["-config.file=/etc/loki/loki-config.yml"]
    ports:
      - "${LOKI_PORT:-3100}:3100"
    volumes:
      - ./observability/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
    networks: [telco]

  # ----------------------------------------------------- Tempo (observability)
  tempo:
    image: grafana/tempo:${TEMPO_VERSION:-2.6.1}
    container_name: telco-tempo
    restart: *restart
    profiles: [observability]
    command: ["-config.file=/etc/tempo/tempo.yml"]
    ports:
      - "${TEMPO_PORT:-3200}:3200"
    volumes:
      - ./observability/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
    networks: [telco]

  # -------------------------------------------- OTel Collector (observability)
  otel-collector:
    image: otel/opentelemetry-collector-contrib:${OTEL_COLLECTOR_VERSION:-0.119.0}
    container_name: telco-otel-collector
    restart: *restart
    profiles: [observability]
    command: ["--config=/etc/otel/otel-collector-config.yaml"]
    depends_on:
      - tempo
      - prometheus
    ports:
      - "${OTEL_GRPC_PORT:-4317}:4317"
      - "${OTEL_HTTP_PORT:-4318}:4318"
    volumes:
      - ./observability/otel-collector/otel-collector-config.yaml:/etc/otel/otel-collector-config.yaml:ro
    networks: [telco]

  # --------------------------------------------------- Grafana (observability)
  grafana:
    image: grafana/grafana:${GRAFANA_VERSION:-11.4.0}
    container_name: telco-grafana
    restart: *restart
    profiles: [observability]
    depends_on:
      - prometheus
      - loki
      - tempo
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    networks: [telco]

  # ---------------------------------------------------------------------------
  # Domain services (apps profile). Each mirrors api-gateway: built from source,
  # bootstraps against config-server, registers with discovery-server. Config
  # (DB/Redis/Kafka hosts, Keycloak JWKS) comes from configs/<svc>/application-
  # docker.yml served by config-server, NOT from container env (see api-gateway
  # comment above) - matches x-app-env exactly.
  # ---------------------------------------------------------------------------

  identity-service:
    <<: *app-common
    build:
      context: ../../
      dockerfile: microservices/identity-service/Dockerfile
    image: telco-identity-service:local
    container_name: telco-identity-service
    ports:
      - "${IDENTITY_SERVICE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9001/actuator/health | grep -q UP || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 90s

  customer-service:
    <<: *app-common
    build:
      context: ../../
      dockerfile: microservices/customer-service/Dockerfile
    image: telco-customer-service:local
    container_name: telco-customer-service
    ports:
      - "${CUSTOMER_SERVICE_PORT:-9002}:9002"
    healthcheck:
