  billing-service:
    <<: *app-common
    build:
      context: ../../
      dockerfile: microservices/billing-service/Dockerfile
    image: telco-billing-service:local
    container_name: telco-billing-service
    ports:
      - "${BILLING_SERVICE_PORT:-9007}:9007"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9007/actuator/health | grep -q UP || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 90s

  payment-service:
    <<: *app-common
    environment:
      <<: *app-env
      # Unset (default) preserves MockPspAdapter's ~10% random charge failure for local dev.
      # CI's acceptance workflow sets this to SUCCESS so the acceptance suite's saga-completion
      # polling isn't racing a real (if simulated) payment failure with no fast retry path.
      PSP_MOCK_FORCE_OUTCOME: ${PSP_MOCK_FORCE_OUTCOME:-}
    build:
      context: ../../
      dockerfile: microservices/payment-service/Dockerfile
    image: telco-payment-service:local
    container_name: telco-payment-service
    ports:
      - "${PAYMENT_SERVICE_PORT:-9008}:9008"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9008/actuator/health | grep -q UP || exit 1"]
