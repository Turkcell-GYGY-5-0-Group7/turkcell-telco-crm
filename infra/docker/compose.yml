    image: telco-usage-service:local
    container_name: telco-usage-service
    ports:
      - "${USAGE_SERVICE_PORT:-9006}:9006"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9006/actuator/health | grep -q UP || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 15
