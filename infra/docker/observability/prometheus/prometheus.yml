# Prometheus scrape configuration for the local Telco CRM stack (ADR-012).
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # Metrics exported by the OpenTelemetry Collector (from services via OTLP).
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]

  # Spring Boot services expose Micrometer metrics at /actuator/prometheus.
  # Add a target per service as they come online, for example:
  # - job_name: customer-service
  #   metrics_path: /actuator/prometheus
  #   static_configs:
  #     - targets: ["host.docker.internal:9002"]
