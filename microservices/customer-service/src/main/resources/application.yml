# Minimal bootstrap only (ADR-010). All runtime config lives centrally in config-server
# (customer-service.yml + customer-service-{dev,test,staging,prod}.yml). Do not add runtime config here.
spring:
  application:
    name: customer-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  cloud:
    config:
      uri: ${CONFIG_SERVER_URI:http://localhost:8888}
      username: ${CONFIG_SERVER_USER:config}
      password: ${CONFIG_SERVER_PASSWORD:config}
  config:
    import: optional:configserver:
