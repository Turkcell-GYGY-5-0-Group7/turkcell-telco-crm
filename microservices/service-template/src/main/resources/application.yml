# Minimal bootstrap only (ADR-010). All runtime config lives centrally in config-server
# (<service-name>.yml + per-env overrides). Do not add runtime config here.
# When copying this template: rename spring.application.name only.
spring:
  application:
    name: service-template
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  cloud:
    config:
      uri: ${CONFIG_SERVER_URI:http://localhost:8888}
      username: ${CONFIG_SERVER_USER:config}
      password: ${CONFIG_SERVER_PASSWORD:config}
  config:
    import: "optional:configserver:"
