# billing-service base config (port 9007, Domain Orchestration, PostgreSQL+MinIO).
# Per-env overrides in billing-service-{dev,test,staging,prod}.yml.

server:
  port: 9007

spring:
  datasource:
    url: ${BILLING_DB_URL:jdbc:postgresql://localhost:5432/billing_db}
    username: ${BILLING_DB_USER:billing}
    password: ${BILLING_DB_PASSWORD:billing}
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect

security:
  oauth2:
    resourceserver:
      jwt:
        jwks-uri: ${KEYCLOAK_JWKS_URI:http://localhost:8080/realms/telco-crm/protocol/openid-connect/certs}

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket:
    invoice-pdfs: invoice-pdfs
