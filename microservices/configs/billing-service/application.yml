# billing-service base config (port 9007, Domain Orchestration, PostgreSQL+MinIO).
# Per-env overrides in billing-service-{dev,test,staging,prod}.yml.

server:
  port: 9007

spring:
  datasource:
    url: ${BILLING_DB_URL:jdbc:postgresql://localhost:5432/billing_db}
    username: ${BILLING_DB_USER:billing}
    password: ${BILLING_DB_PASSWORD:billing}
    hikari:
      # Sized for the bill-run's parallel batches (telco.billing.bill-run.parallelism) plus the
      # one idle connection the mediator's own outer transaction holds for the whole command
      # (ADR-009 TransactionBehavior) plus headroom for concurrent read-API/consumer traffic
      # (NFR-02 tuning, 14.3.2).
      maximum-pool-size: ${BILLING_DB_POOL_SIZE:20}
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    open-in-view: false
  flyway:
    locations: classpath:db/migration,classpath:db/migration/platform
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: billing-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      max-poll-records: 500

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

telco:
  clients:
    product-catalog-service:
      url: ${PRODUCT_CATALOG_URL:http://localhost:9003}
  platform:
    observability:
      correlation:
        enabled: true
    outbox:
      enabled: true
    inbox:
      enabled: true
  billing:
    tax-rate: "0.18"
    due-days: 30
    bill-run:
      # Batching/parallelism tuning for NFR-02 (100K subscribers under 30 minutes, no duplicate
      # invoices) — see docs/tasks/sprint-14-testing-and-hardening/14.3-bill-run-throughput-report.md.
      batch-size: ${BILLING_BILL_RUN_BATCH_SIZE:500}
      parallelism: ${BILLING_BILL_RUN_PARALLELISM:8}

security:
  oauth2:
    resourceserver:
      jwt:
        jwks-uri: ${KEYCLOAK_JWKS_URI:http://localhost:8080/realms/telco-crm/protocol/openid-connect/certs}

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket:
    invoice-pdfs: invoice-pdfs
