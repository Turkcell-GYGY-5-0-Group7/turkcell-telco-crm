# billing-service Kubernetes (in-cluster Helm) overrides, activated as SPRING_PROFILES_ACTIVE=dev,k8s
# (Feature 18.5, ADR-025 Section 4). Replaces the `docker` profile for in-cluster deployment: same
# in-cluster hostnames/client URLs as application-docker.yml (kept, non-secret), but the DB
# username/password are read from the pod environment (Vault-sourced via the CSI-synced Secret,
# 18.5.1/18.5.3) instead of the committed `billing`/`billing` plaintext the `docker` profile bakes in.
# MinIO endpoint/access-key/secret-key are unchanged from the docker profile - out of this feature's
# scope (18.5 is DB credentials only, per ADR-025 Section 2's mapping table).
spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/billing_db
    username: ${BILLING_DB_USER}
    password: ${BILLING_DB_PASSWORD}
  kafka:
    bootstrap-servers: kafka:9092
  security:
    oauth2:
      resourceserver:
        jwt:
          jwks-uri: http://keycloak:8080/realms/telco-crm/protocol/openid-connect/certs

telco:
  clients:
    product-catalog-service:
      url: http://product-catalog-service:9003

minio:
  endpoint: http://minio:9000
