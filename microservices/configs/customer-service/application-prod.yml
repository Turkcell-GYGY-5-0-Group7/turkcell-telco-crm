# customer-service prod overrides. Credentials injected via Kubernetes Secrets / Vault.
spring:
  datasource:
    url: ${CUSTOMER_DB_URL}
    username: ${CUSTOMER_DB_USER}
    password: ${CUSTOMER_DB_PASSWORD}
minio:
  endpoint: ${MINIO_ENDPOINT}
  access-key: ${MINIO_ACCESS_KEY}
  secret-key: ${MINIO_SECRET_KEY}
customer:
  crypto:
    # PII-at-rest key (NFR-06). No default: a missing CUSTOMER_AES_KEY must fail startup rather than
    # silently fall back to the public dev key inherited from application.yml. Injected from a
    # Kubernetes Secret / Vault.
    aes-key: ${CUSTOMER_AES_KEY}
