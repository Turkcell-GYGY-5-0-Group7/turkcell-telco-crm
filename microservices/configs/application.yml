# Shared defaults applied to ALL services across ALL environments.
# Service-specific files (e.g. identity-service.yml) override these.
# Per-env files (e.g. application-dev.yml) further override after this.

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      otlp:
        enabled: true

logging:
  level:
    root: INFO
    com.telco: INFO

spring:
  cloud:
    # Spring Cloud 2025.1.0 + Spring Boot 4.1.0 are compatible;
    # the verifier's known-version table lags the actual release.
    compatibility-verifier:
      enabled: false
    discovery:
      enabled: true

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_USERNAME:eureka}:${EUREKA_PASSWORD:eureka}@${EUREKA_HOST:localhost}:${EUREKA_PORT:8761}/eureka
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

resilience4j:
  circuitbreaker:
    configs:
      default:
        failure-rate-threshold: 50
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
    instances:
      keycloak-admin:
        base-config: default
      minio:
        base-config: default
        wait-duration-in-open-state: 60s
      product-catalog-service:
        base-config: default
      notification-channel:
        base-config: default
        failure-rate-threshold: 30
  retry:
    configs:
      default:
        max-attempts: 3
        wait-duration: 500ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
    instances:
      keycloak-admin:
        base-config: default
      minio:
        base-config: default
        max-attempts: 2
  bulkhead:
    configs:
      default:
        max-concurrent-calls: 20
        max-wait-duration: 0
    instances:
      notification-channel:
        base-config: default
        max-concurrent-calls: 10
