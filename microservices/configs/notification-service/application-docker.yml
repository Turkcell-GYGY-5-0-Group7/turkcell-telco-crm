# notification-service Docker Compose overrides applied when SPRING_PROFILES_ACTIVE includes 'docker'.
# Overrides the localhost values in application-dev.yml with Docker service names.

spring:
  mongodb:
    uri: mongodb://mongo:27017/notification_db
  datasource:
    url: jdbc:postgresql://postgres:5432/notification_db
    username: notification
    password: notification
  kafka:
    bootstrap-servers: kafka:9092
  security:
    oauth2:
      resourceserver:
        jwt:
          jwks-uri: http://keycloak:8080/realms/telco-crm/protocol/openid-connect/certs
