# Shared Docker Compose overrides applied to ALL services when SPRING_PROFILES_ACTIVE includes 'docker'.
# Overrides dev (localhost) addresses with Docker service-name addresses.
# Loaded AFTER application-dev.yml so these values win.

eureka:
  instance:
    hostname: ${spring.application.name}
  client:
    service-url:
      defaultZone: http://${EUREKA_USERNAME:eureka}:${EUREKA_PASSWORD:eureka}@discovery-server:8761/eureka

# OTel Collector runs in the Docker network; services push OTLP over HTTP (ADR-012).
management:
  otlp:
    tracing:
      endpoint: http://otel-collector:4318/v1/traces

# Kafka span propagation: each KafkaTemplate send and listener invocation creates a child span.
spring:
  kafka:
    template:
      observation-enabled: true
    listener:
      observation-enabled: true

# Loki push URL consumed by <springProperty> in logback-spring.xml (ADR-012).
loki:
  url: http://loki:3100/loki/api/v1/push
