# order-service Docker Compose overrides applied when SPRING_PROFILES_ACTIVE includes 'docker'.
# Overrides the localhost values in application-dev.yml with Docker service names.

spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/order_db
    username: order
    password: order
  kafka:
    bootstrap-servers: kafka:9092
  security:
    oauth2:
      resourceserver:
        jwt:
          jwks-uri: http://keycloak:8080/realms/telco-crm/protocol/openid-connect/certs

telco:
  clients:
    customer-service:
      url: http://customer-service:9002
    product-catalog-service:
      url: http://product-catalog-service:9003
