# order-service base config (port 9004, Domain Orchestration, PostgreSQL).
# Per-env overrides in order-service-{dev,test,staging,prod}.yml.

server:
  port: 9004

spring:
  datasource:
    url: ${ORDER_DB_URL:jdbc:postgresql://localhost:5432/order_db}
    username: ${ORDER_DB_USER:order}
    password: ${ORDER_DB_PASSWORD:order}
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      # Flyway owns the schema; Hibernate never alters it (ADR-016).
      ddl-auto: none
    open-in-view: false
  flyway:
    # Service migrations + platform migrations (outbox V900, inbox V901). ADR-016.
    locations: classpath:db/migration,classpath:db/migration/platform
  kafka:
    # Consumes onboarding-saga events (payment.completed.v1, subscription.activated.v1,
    # payment.refunded.v1) idempotently via the inbox. ADR-005, ADR-009, AC-01.
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: order-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

security:
  oauth2:
    resourceserver:
      jwt:
        jwks-uri: ${KEYCLOAK_JWKS_URI:http://localhost:8080/realms/telco-crm/protocol/openid-connect/certs}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

telco:
  platform:
    observability:
      correlation:
        enabled: true
    outbox:
      enabled: true
    inbox:
      enabled: true
  clients:
    customer-service:
      url: ${CUSTOMER_SERVICE_URL:http://customer-service}
    product-catalog-service:
      url: ${CATALOG_SERVICE_URL:http://product-catalog-service}
    campaign-service:
      url: ${CAMPAIGN_SERVICE_URL:http://campaign-service}
    subscription-service:
      url: ${SUBSCRIPTION_SERVICE_URL:http://subscription-service}
