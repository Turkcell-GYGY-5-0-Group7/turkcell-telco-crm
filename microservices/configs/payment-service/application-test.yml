# payment-service test overrides. Testcontainers wires URLs at runtime.
spring:
  datasource:
    url: ${TEST_PAYMENT_DB_URL:jdbc:postgresql://localhost:5432/payment_test_db}
    username: ${TEST_PAYMENT_DB_USER:payment_test}
    password: ${TEST_PAYMENT_DB_PASSWORD:payment_test}
  data:
    redis:
      host: ${TEST_REDIS_HOST:localhost}
      port: ${TEST_REDIS_PORT:6379}
