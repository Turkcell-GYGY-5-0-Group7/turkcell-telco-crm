# payment-service base config (port 9008, Domain Orchestration, PostgreSQL).
# Per-env overrides in payment-service-{dev,docker,staging,prod}.yml.

server:
  port: 9008

spring:
  datasource:
    url: ${PAYMENT_DB_URL:jdbc:postgresql://localhost:5432/payment_db}
    username: ${PAYMENT_DB_USER:payment}
    password: ${PAYMENT_DB_PASSWORD:payment}
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      # Flyway owns the schema; Hibernate never alters it (ADR-016).
      ddl-auto: none
    open-in-view: false
  flyway:
    # Service migrations + platform migrations (outbox/inbox V900). ADR-016.
    locations: classpath:db/migration,classpath:db/migration/platform
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: payment-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

security:
  oauth2:
    resourceserver:
      jwt:
        jwks-uri: ${KEYCLOAK_JWKS_URI:http://localhost:8080/realms/telco-crm/protocol/openid-connect/certs}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

telco:
  platform:
    observability:
      correlation:
        enabled: true
    outbox:
      enabled: true
    inbox:
      enabled: true
  psp:
    mock:
      # Deterministic override for MockPspAdapter.charge, for CI/acceptance reproducibility.
      # Unset (default): original ~10% random failure rate. SUCCESS/FAILURE: force every charge.
      force-outcome: ${PSP_MOCK_FORCE_OUTCOME:}

# Retry scheduler enabled (see PaymentRetryScheduler).
scheduling:
  enabled: true
