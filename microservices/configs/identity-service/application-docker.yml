# identity-service Docker Compose overrides applied when SPRING_PROFILES_ACTIVE includes 'docker'.
# Overrides the localhost values in application-dev.yml with Docker service names.

spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/identity_db
    username: identity
    password: identity

security:
  oauth2:
    resourceserver:
      jwt:
        jwks-uri: http://keycloak:8080/realms/telco-crm/protocol/openid-connect/certs

keycloak:
  admin:
    server-url: http://keycloak:8080
