# api-gateway prod overrides. Credentials injected via Kubernetes Secrets / Vault.
spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          jwks-uri: ${KEYCLOAK_JWKS_URI}

# CORS origins MUST live under gateway.cors.* — that is the key GatewaySecurityConfig binds.
gateway:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://telco-crm.com}
