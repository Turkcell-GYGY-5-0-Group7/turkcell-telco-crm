# api-gateway dev overrides — all values point at local docker-compose stack.
spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          # Keycloak runs on 8085 locally (not 8080); see infra/docker/compose.yml auth profile.
          jwks-uri: http://localhost:8085/realms/telco-crm/protocol/openid-connect/certs

  data:
    redis:
      # Use 127.0.0.1 not 'localhost' — Lettuce's async DNS resolver cannot resolve
      # 'localhost' on macOS without netty-resolver-dns-native-macos on the classpath.
      host: 127.0.0.1
      port: 6379
      password: ${REDIS_PASSWORD:telco}

gateway:
  keycloak:
    uri: http://localhost:8085
  cors:
    # Dev: allow local frontend. Production: set CORS_ALLOWED_ORIGINS to explicit origin(s).
    allowed-origins: http://localhost:5173,http://localhost:3000

logging:
  level:
    com.telco.gateway: DEBUG
    org.springframework.security: DEBUG
