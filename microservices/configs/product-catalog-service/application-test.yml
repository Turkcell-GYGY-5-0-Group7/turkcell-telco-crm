# product-catalog-service test overrides. Testcontainers wires URLs at runtime.
spring:
  datasource:
    url: ${TEST_CATALOG_DB_URL:jdbc:postgresql://localhost:5432/catalog_test_db}
    username: ${TEST_CATALOG_DB_USER:catalog_test}
    password: ${TEST_CATALOG_DB_PASSWORD:catalog_test}
  data:
    redis:
      host: ${TEST_REDIS_HOST:localhost}
      port: ${TEST_REDIS_PORT:6379}
