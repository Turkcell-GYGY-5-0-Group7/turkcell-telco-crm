# API Gateway minimal bootstrap. It is a normal config-server client: routes, filters, CORS, and
# rate-limit config are served centrally from api-gateway.yml (ADR-010). Port is set centrally.
spring:
  application:
    name: api-gateway
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  cloud:
    config:
      uri: ${CONFIG_SERVER_URI:http://localhost:8888}
      username: ${CONFIG_SERVER_USER:config}
      password: ${CONFIG_SERVER_PASSWORD:config}
  config:
    import: optional:configserver:
