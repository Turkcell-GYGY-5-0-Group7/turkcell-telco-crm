name: Update Parent Repository

on:
  push:
    branches:
      - master

jobs:
  update-parent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout parent repository
        uses: actions/checkout@v7
        with:
          repository: omerekmen/turkcell-gygy-java
          token: ${{ secrets.MAIN_REPO_TOKEN }}
          submodules: recursive

      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Update submodule
        run: |
          git submodule update \
            --init \
            --remote \
            telco-crm

      - name: Build commit message
        id: msg
        run: |
          echo "message<<EOF" >> $GITHUB_OUTPUT
          echo "chore: update telco-crm submodule" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "${{ github.event.head_commit.message }}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Commit changes
        run: |
          git add telco-crm

          git diff --cached --quiet && exit 0

          git commit -m "${{ steps.msg.outputs.message }}"

      - name: Push changes
        run: |
          git push origin master
 
