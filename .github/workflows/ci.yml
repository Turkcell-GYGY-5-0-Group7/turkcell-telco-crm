name: CI

# Implements the per-service CI pipeline defined in ADR-014:
# Build -> Test -> Package -> Static Analysis -> Security Scan.
# The Maven reactor root is platform/pom.xml (no root pom exists yet).

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read
  security-events: write   # CodeQL SARIF upload
  pull-requests: write     # JaCoCo coverage comment on PRs

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: "21"
  MAVEN_ARGS: "-B -ntp"

jobs:
  build-test:
    name: Build, Test, Package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Verify Maven reactor exists
        id: reactor
        run: |
          if [ -f platform/pom.xml ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "platform/pom.xml not found; skipping Maven build."
          fi

      - name: Build and verify (unit + integration tests)
        if: steps.reactor.outputs.found == 'true'
        working-directory: platform
        # Static analysis runs in its own job; schema-registry check requires a live server.
        run: mvn ${MAVEN_ARGS} verify -Dcheckstyle.skip=true -Dspotbugs.skip=true -Dschema.registry.skip=true

      - name: Upload test reports
        if: always() && steps.reactor.outputs.found == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: |
            platform/**/target/surefire-reports/**
            platform/**/target/failsafe-reports/**
          if-no-files-found: ignore
          retention-days: 7

  static-analysis:
    name: Static Analysis (Checkstyle, SpotBugs)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      # Checkstyle + SpotBugs are bound to the verify phase in platform/pom.xml (ADR-014).
      # Skipping tests keeps this stage focused on static analysis; it fails on any violation.
      # Schema Registry compatibility (Feature 14.5, phase 8): this per-PR pipeline has no live
      # Schema Registry available, so the kafka-schema-registry-maven-plugin check stays skipped
      # here by design (residual, pre-existing gap, not reopened by this feature). The
      # acceptance.yml workflow's "platform" profile stack does bring up a live registry (for
      # Debezium) and runs this check for real against all 33 canonical subjects - see the
      # "SCHEMA REGISTRY COMPATIBILITY GATE" comment there for exactly what that step does and
      # does not guarantee (registrability, not persisted-history BACKWARD-compat drift).
      - name: Run static analysis
        if: hashFiles('platform/pom.xml') != ''
        working-directory: platform
        run: mvn ${MAVEN_ARGS} -DskipTests verify -Dschema.registry.skip=true

  codeql:
    name: Security Scan (CodeQL)
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java-kotlin
          build-mode: manual

      - name: Build for analysis
        if: hashFiles('platform/pom.xml') != ''
        working-directory: platform
        run: mvn ${MAVEN_ARGS} -DskipTests package

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:java-kotlin"

  microservices-test:
    name: Microservices - Test and Coverage
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      # Platform SNAPSHOTs are not published to Maven Central; install them into the local
      # repo so microservices can resolve starter dependencies. Tests are skipped here because
      # platform tests already ran and passed in build-test.
      - name: Install platform to local Maven repo
        if: hashFiles('platform/pom.xml') != ''
        working-directory: platform
        run: mvn ${MAVEN_ARGS} install -DskipTests -Dspotbugs.skip=true -Dschema.registry.skip=true

      # --fail-at-end lets every service run even if one fails, so all surefire reports
      # and JaCoCo XMLs are generated before the job is marked failed.
      #
      # COVERAGE GATE (ADR-013, task 14.1.3, NFR-17): `verify` runs the JaCoCo `check` goal
      # (per-module, 70% LINE by default) declared in microservices/pom.xml. HARD GATE as of
      # tech-lead ruling 2026-07-06 (jacoco.haltOnFailure=true): any module below its coverage
      # floor fails this step, which fails this job, which fails the required CI check on the
      # PR. Documented, dated exceptions live in the affected modules' own pom.xml
      # (reference-service/service-template skip the check goal entirely, ADR-017;
      # identity-service/billing-service carry lower per-module floors) - see
      # docs/tasks/sprint-14-testing-and-hardening/README.md for the full ruling.
      - name: Run microservices tests with coverage
        if: hashFiles('microservices/pom.xml') != ''
        working-directory: microservices
        run: mvn ${MAVEN_ARGS} verify --fail-at-end -Dspotbugs.skip=true -Dcheckstyle.skip=true

      # Surfaces per-module coverage numbers as a PR comment (reporting only, informational).
      # continue-on-error is kept even now that the Maven gate above is a hard block: this step
      # only runs after the Maven step already succeeded (a failing gate fails the job before
      # this step is reached), so continue-on-error here is not softening the coverage gate - it
      # only protects against this third-party GitHub-API action itself failing/rate-limiting and
      # spuriously red-flagging an otherwise-green, gate-passing build. Left in place by design.
      - name: Post coverage report on PR
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: madrapps/jacoco-report@v1.6.1
        with:
          paths: ${{ github.workspace }}/microservices/**/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 70
          min-coverage-changed-files: 60
          title: Coverage Report
          update-comment: true

      - name: Upload JaCoCo coverage reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jacoco-coverage-reports
          path: microservices/**/target/site/jacoco/jacoco.xml
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload surefire and failsafe reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: microservices-test-reports
          path: |
            microservices/**/target/surefire-reports/**
            microservices/**/target/failsafe-reports/**
          if-no-files-found: ignore
          retention-days: 7
