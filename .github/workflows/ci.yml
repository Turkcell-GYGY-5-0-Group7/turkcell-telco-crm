name: CI

# Implements the per-service CI pipeline defined in ADR-014:
# Build -> Test -> Package -> Static Analysis -> Security Scan.
# The Maven reactor root is platform/pom.xml (no root pom exists yet).

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read
  security-events: write   # CodeQL SARIF upload
  pull-requests: write     # JaCoCo coverage comment on PRs

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: "21"
  MAVEN_ARGS: "-B -ntp"

jobs:
  build-test:
    name: Build, Test, Package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Verify Maven reactor exists
        id: reactor
        run: |
          if [ -f platform/pom.xml ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "platform/pom.xml not found; skipping Maven build."
          fi

      - name: Build and verify (unit + integration tests)
        if: steps.reactor.outputs.found == 'true'
        working-directory: platform
        # Static analysis runs in its own job; schema-registry check requires a live server.
        run: mvn ${MAVEN_ARGS} verify -Dcheckstyle.skip=true -Dspotbugs.skip=true -Dschema.registry.skip=true

      - name: Upload test reports
        if: always() && steps.reactor.outputs.found == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: |
            platform/**/target/surefire-reports/**
            platform/**/target/failsafe-reports/**
          if-no-files-found: ignore
          retention-days: 7

  static-analysis:
    name: Static Analysis (Checkstyle, SpotBugs)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      # Checkstyle + SpotBugs are bound to the verify phase in platform/pom.xml (ADR-014).
      # Skipping tests keeps this stage focused on static analysis; it fails on any violation.
      # Schema Registry compatibility (Feature 14.5, phase 8): this per-PR pipeline has no live
      # Schema Registry available, so the kafka-schema-registry-maven-plugin check stays skipped
      # here by design (residual, pre-existing gap, not reopened by this feature). The
      # acceptance.yml workflow's "platform" profile stack does bring up a live registry (for
      # Debezium) and runs this check for real against all 33 canonical subjects - see the
      # "SCHEMA REGISTRY COMPATIBILITY GATE" comment there for exactly what that step does and
      # does not guarantee (registrability, not persisted-history BACKWARD-compat drift).
      - name: Run static analysis
        if: hashFiles('platform/pom.xml') != ''
        working-directory: platform
        run: mvn ${MAVEN_ARGS} -DskipTests verify -Dschema.registry.skip=true

  codeql:
    name: Security Scan (CodeQL)
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java-kotlin
          build-mode: manual

      - name: Build for analysis
        if: hashFiles('platform/pom.xml') != ''
        working-directory: platform
        run: mvn ${MAVEN_ARGS} -DskipTests package

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:java-kotlin"

  microservices-test:
    name: Microservices - Test and Coverage
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      # Platform SNAPSHOTs are not published to Maven Central; install them into the local
      # repo so microservices can resolve starter dependencies. Tests are skipped here because
      # platform tests already ran and passed in build-test.
      - name: Install platform to local Maven repo
        if: hashFiles('platform/pom.xml') != ''
        working-directory: platform
        run: mvn ${MAVEN_ARGS} install -DskipTests -Dspotbugs.skip=true -Dschema.registry.skip=true

      # --fail-at-end lets every service run even if one fails, so all surefire reports
      # and JaCoCo XMLs are generated before the job is marked failed.
      #
      # COVERAGE GATE (ADR-013, task 14.1.3, NFR-17): `verify` runs the JaCoCo `check` goal
      # (per-module, 70% LINE by default) declared in microservices/pom.xml. HARD GATE as of
      # tech-lead ruling 2026-07-06 (jacoco.haltOnFailure=true): any module below its coverage
      # floor fails this step, which fails this job, which fails the required CI check on the
      # PR. Documented, dated exceptions live in the affected modules' own pom.xml
      # (reference-service/service-template skip the check goal entirely, ADR-017;
      # identity-service/billing-service carry lower per-module floors) - see
      # docs/tasks/sprint-14-testing-and-hardening/README.md for the full ruling.
      - name: Run microservices tests with coverage
        if: hashFiles('microservices/pom.xml') != ''
        working-directory: microservices
        run: mvn ${MAVEN_ARGS} verify --fail-at-end -Dspotbugs.skip=true -Dcheckstyle.skip=true

      # Surfaces per-module coverage numbers as a PR comment (reporting only, informational).
      # continue-on-error is kept even now that the Maven gate above is a hard block: this step
      # only runs after the Maven step already succeeded (a failing gate fails the job before
      # this step is reached), so continue-on-error here is not softening the coverage gate - it
      # only protects against this third-party GitHub-API action itself failing/rate-limiting and
      # spuriously red-flagging an otherwise-green, gate-passing build. Left in place by design.
      - name: Post coverage report on PR
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: madrapps/jacoco-report@v1.8.0
        with:
          paths: ${{ github.workspace }}/microservices/**/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 70
          min-coverage-changed-files: 60
          title: Coverage Report
          update-comment: true

      - name: Upload JaCoCo coverage reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jacoco-coverage-reports
          path: microservices/**/target/site/jacoco/jacoco.xml
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload surefire and failsafe reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: microservices-test-reports
          path: |
            microservices/**/target/surefire-reports/**
            microservices/**/target/failsafe-reports/**
          if-no-files-found: ignore
          retention-days: 7

  # -------------------------------------------------------------------------
  # Image build + push (task 15.1.2, ADR-014).
  #
  # These jobs turn a green master build into deployable, versioned container
  # images in GHCR. They ONLY run on real merges (push to master), never on
  # pull_request, so a PR can never publish an image. The push job also `needs`
  # the two test jobs, so a red build never publishes: the gate is preserved.
  # -------------------------------------------------------------------------

  # Decide which of the 13 in-scope MVP services actually changed in this merge.
  # Emits a JSON matrix consumed by build-push-images ("for changed services").
  #
  # Rule (services share the platform reactor + centralized config):
  #   - platform/**, microservices/configs/**, or microservices/pom.xml changed
  #     => every service is rebuilt (the shared foundation moved).
  #   - microservices/<svc>/** changed => only <svc> is rebuilt.
  # reference-service, service-template (ADR-017 templates) and web-bff
  # (Sprint 16, post-MVP) are intentionally excluded from SERVICES below.
  changes:
    name: Detect changed services
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
      any: ${{ steps.detect.outputs.any }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # Full history so we can diff the pushed range (before..after).
          fetch-depth: 0

      - name: Compute changed services
        id: detect
        env:
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.sha }}
        run: |
          set -euo pipefail
          SERVICES="api-gateway discovery-server config-server identity-service \
            customer-service product-catalog-service order-service subscription-service \
            usage-service billing-service payment-service notification-service ticket-service"
          ZERO="0000000000000000000000000000000000000000"

          rebuild_all() {
            echo "$*" >&2
            CHANGED="$SERVICES"
          }

          if [ -z "${BEFORE:-}" ] || [ "$BEFORE" = "$ZERO" ] \
             || ! git cat-file -e "${BEFORE}^{commit}" 2>/dev/null; then
            rebuild_all "No usable base commit (new branch / force-push / shallow); rebuilding all services."
          else
            FILES="$(git diff --name-only "$BEFORE" "$AFTER")"
            echo "Changed files in ${BEFORE}..${AFTER}:" >&2
            echo "$FILES" >&2
            if echo "$FILES" | grep -qE '^(platform/|microservices/configs/|microservices/pom\.xml$)'; then
              rebuild_all "Shared foundation changed (platform / configs / reactor pom); rebuilding all services."
            else
              CHANGED=""
              for svc in $SERVICES; do
                if echo "$FILES" | grep -qE "^microservices/${svc}/"; then
                  CHANGED="$CHANGED $svc"
                fi
              done
            fi
          fi

          # Trim and emit a JSON matrix. Empty => build-push-images is skipped cleanly.
          CHANGED="$(echo "$CHANGED" | xargs || true)"
          if [ -z "$CHANGED" ]; then
            echo "No in-scope service changed; image build will be skipped." >&2
            echo 'matrix={"service":[]}' >> "$GITHUB_OUTPUT"
            echo 'any=false' >> "$GITHUB_OUTPUT"
          else
            echo "Services to build: $CHANGED" >&2
            MATRIX="$(printf '%s\n' $CHANGED | jq -R . | jq -sc '{service: .}')"
            echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
            echo 'any=true' >> "$GITHUB_OUTPUT"
          fi

  # Build and push one image per changed service. Gated on the test jobs so a
  # red build never publishes; matrix keeps services independent (fail-fast off).
  build-push-images:
    name: Build & Push Image (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: [build-test, microservices-test, changes]
    if: needs.changes.outputs.any == 'true'
    permissions:
      contents: read
      packages: write   # least-privilege: only this job may push to GHCR
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.changes.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tags/labels are computed here rather than via docker/metadata-action
      # because the version tag is the Maven reactor version read from the pom
      # at runtime (metadata-action cannot read arbitrary file contents).
      - name: Compute image tags
        id: meta
        run: |
          set -euo pipefail
          OWNER="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          IMAGE="ghcr.io/${OWNER}/telco-${{ matrix.service }}"
          SHA_TAG="sha-$(echo "${{ github.sha }}" | cut -c1-12)"
          # Reactor project version = first <version> after </parent> in the pom
          # (the parent <version> above it is Spring Boot's, not ours). Uses sed
          # (BRE) rather than grep -P so it is locale-independent on any runner.
          VERSION="$(sed -n '/<\/parent>/,$p' microservices/pom.xml \
            | sed -n 's/.*<version>\([^<]*\)<\/version>.*/\1/p' | head -1)"
          # Docker tags allow [A-Za-z0-9._-]; sanitize just in case.
          VERSION_TAG="$(echo "$VERSION" | sed 's/[^A-Za-z0-9._-]/-/g')"
          echo "image=$IMAGE"             >> "$GITHUB_OUTPUT"
          echo "sha_tag=$SHA_TAG"         >> "$GITHUB_OUTPUT"
          echo "version_tag=$VERSION_TAG" >> "$GITHUB_OUTPUT"
          echo "Tagging $IMAGE with: $SHA_TAG, $VERSION_TAG, latest" >&2

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .                                         # build context = repo root
          file: microservices/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.sha_tag }}
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version_tag }}
            ${{ steps.meta.outputs.image }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
